    <script>
        class ApiClient {
            constructor() {
                this.baseUrl = 'https://magic-pedic-api.onrender.com/api';
                this.token = localStorage.getItem('auth_token');
            }
            setToken(token) {
                this.token = token;
                if (token) { localStorage.setItem('auth_token', token); }
                else { localStorage.removeItem('auth_token'); }
            }
            async request(method, endpoint, data = null) {
                const options = { method, headers: {} };
                if (this.token) { options.headers['Authorization'] = 'Bearer ' + this.token; }
                if (data && !(data instanceof FormData)) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                } else if (data instanceof FormData) { options.body = data; }
                try {
                    const response = await fetch(this.baseUrl + endpoint, options);
                    const result = await response.json();
                    if (!response.ok) { throw new Error(result.error || 'Ошибка сервера'); }
                    return result;
                } catch (err) { console.error('API Error:', err); throw err; }
            }
            async register(email, username, password) { return this.request('POST', '/register', { email, username, password }); }
            async login(email, password) {
                const result = await this.request('POST', '/login', { email, password });
                if (result.token) {
                    this.setToken(result.token);
                    currentUser = result.user;
                    localStorage.setItem('magicPedicUser', JSON.stringify(result.user));
                }
                return result;
            }
            async getProfile() {
                const result = await this.request('GET', '/profile');
                if (result.user) {
                    currentUser = result.user;
                    localStorage.setItem('magicPedicUser', JSON.stringify(result.user));
                }
                return result;
            }
            async updateProfile(data) {
                const result = await this.request('PUT', '/profile', data);
                if (result.success) { await this.getProfile(); }
                return result;
            }
            async getGallery() { return this.request('GET', '/gallery'); }
            async addGalleryImage(imageFile, title, description) {
                const formData = new FormData();
                formData.append('image', imageFile);
                formData.append('title', title);
                formData.append('description', description || '');
                return this.request('POST', '/gallery', formData);
            }
            async deleteGalleryImage(imageId) { return this.request('DELETE', '/gallery/' + imageId); }
            async updateGalleryImage(imageId, data) { return this.request('PUT', '/gallery/' + imageId, data); }
            async getUsers() { return this.request('GET', '/users'); }
            async getUserByEmail(email) { return this.request('GET', '/users/email/' + encodeURIComponent(email)); }
            async addFriend(friendId) { return this.request('POST', '/friends/add', { friendId: friendId }); }
            async removeFriend(friendId) { return this.request('DELETE', '/friends/remove', { friendId: friendId }); }
            async getFriends() { return this.request('GET', '/friends'); }
            async sendVerificationCode(email, username) { return this.request('POST', '/verify/send-code', { email, username }); }
            async verifyCode(email, code) { return this.request('POST', '/verify/check-code', { email, code }); }
            async updateUserRole(userEmail, newRole) { return this.request('PUT', '/admin/role', { email: userEmail, role: newRole }); }
            logout() {
                this.setToken(null);
                localStorage.removeItem('magicPedicUser');
                currentUser = null;
            }
        }
        const api = new ApiClient();
    </script>

        // ===== ГЛАВНОЕ ИСПРАВЛЕНИЕ: РЕГИСТРАЦИЯ С АВТОВХОДОМ =====
        function showVerificationModal(email, username, password, correctCode) {
            safeRemove('verifyModal');
            const modalHTML = `<div class="modal-overlay" id="verifyModal"><div class="modal-content" style="max-width:450px;"><h2><i class="fas fa-shield-alt"></i> Подтверждение</h2><div class="verification-icon"><i class="fas fa-envelope-open-text"></i></div><div class="verification-info">Мы отправили 6-значный код подтверждения на почту<br><strong>${email}</strong></div><div class="code-input-group">${['vc1','vc2','vc3','vc4','vc5','vc6'].map(id => `<input type="text" class="code-input" id="${id}" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">`).join('')}</div><div style="text-align:center;margin-top:15px;"><p style="color:#888;font-size:0.9rem;">Не пришёл код? <span class="resend-link" id="resendCode">Отправить повторно</span></p><p class="verification-timer" id="verificationTimer"></p></div><div class="modal-buttons" style="margin-top:25px;"><button class="modal-btn primary" id="verifyCodeBtn"><i class="fas fa-check-circle"></i> Подтвердить</button><button class="modal-btn secondary" id="cancelVerify"><i class="fas fa-times-circle"></i> Отмена</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            const inputs = document.querySelectorAll('#verifyModal .code-input');
            let timeLeft = 600;
            let timerInterval = null;
            const timerDisplay = document.getElementById('verificationTimer');
            
            function updateTimer() {
                if (!document.getElementById('verifyModal')) { if (timerInterval) clearInterval(timerInterval); return; }
                if (timerDisplay) { const m = Math.floor(timeLeft / 60); const s = timeLeft % 60; timerDisplay.textContent = `Код действителен: ${m}:${s.toString().padStart(2, '0')}`; if (timeLeft <= 60) timerDisplay.style.color = '#f44336'; }
                if (timeLeft <= 0) { if (timerInterval) clearInterval(timerInterval); if (timerDisplay) timerDisplay.textContent = 'Время кода истекло'; inputs.forEach(inp => { inp.disabled = true; inp.classList.add('error'); }); }
                timeLeft--;
            }
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            
            function checkAllFilled() {
                const allFilled = Array.from(inputs).every(inp => inp.value !== '');
                const verifyBtn = document.getElementById('verifyCodeBtn');
                if (verifyBtn) {
                    if (allFilled) { verifyBtn.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32)'; verifyBtn.style.color = '#ffffff'; verifyBtn.style.borderColor = '#4CAF50'; }
                    else { verifyBtn.style.background = '#ffffff'; verifyBtn.style.color = '#000000'; verifyBtn.style.borderColor = '#ffffff'; }
                }
            }
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', function(e) {
                    const value = e.target.value;
                    if (!/^\d$/.test(value)) { e.target.value = ''; return; }
                    if (value) { input.classList.add('filled'); } else { input.classList.remove('filled'); }
                    if (value && index < 5) inputs[index + 1].focus();
                    checkAllFilled();
                });
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) { inputs[index - 1].focus(); inputs[index - 1].classList.remove('filled'); }
                });
            });
            
            document.getElementById('verifyModal').addEventListener('click', function(e) { if (e.target === this) { if (timerInterval) clearInterval(timerInterval); safeRemove('verifyModal'); } });
            document.getElementById('cancelVerify').addEventListener('click', function() { if (timerInterval) clearInterval(timerInterval); safeRemove('verifyModal'); showToast('Регистрация отменена', 2000); });
            document.getElementById('resendCode').addEventListener('click', async function() {
                const newCode = await sendVerificationCodeToUser(email, username);
                if (newCode) { correctCode = newCode; inputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled', 'error'); inp.disabled = false; }); if (inputs[0]) inputs[0].focus(); timeLeft = 600; if (timerDisplay) timerDisplay.style.color = '#888'; showToast('✅ Новый код отправлен!', 3000); }
            });
            document.getElementById('verifyCodeBtn').addEventListener('click', async function() {
                let enteredCode = ''; inputs.forEach(inp => enteredCode += inp.value);
                if (enteredCode.length !== 6) { showToast('❌ Введите все 6 цифр кода', 3000); return; }
                try {
                    const result = await api.verifyCode(email, enteredCode);
                    if (result.valid) {
                        if (timerInterval) clearInterval(timerInterval);
                        safeRemove('verifyModal');
                        
                        // Регистрируем на сервере
                        try { await api.register(email, username, password); } catch(e) {}
                        
                        // ===== ВАЖНО: АВТОМАТИЧЕСКИЙ ВХОД ПОСЛЕ РЕГИСТРАЦИИ =====
                        try {
                            const loginResult = await api.login(email, password);
                            if (loginResult.token) {
                                await api.getProfile();
                                console.log('✅ Автовход после регистрации успешен!');
                            }
                        } catch(e) { console.warn('Автовход не удался:', e.message); }
                        
                        addNotification('🆕 Регистрация', 'Новый пользователь: ' + username);
                        showToast('✅ Регистрация успешно завершена! Добро пожаловать!', 3000);
                        navigateTo('main');
                    } else { showToast('❌ Неверный код подтверждения', 3000); }
                } catch (err) { showToast('❌ Ошибка проверки кода', 3000); }
            });
            setTimeout(() => { if (inputs[0] && document.getElementById('verifyModal')) inputs[0].focus(); }, 500);
        }

            const dn = currentUser.nickname || currentUser.username;
            const role = getUserRole(currentUser);
            return `<div class="card"><h2><i class="fas fa-user-circle"></i> Личный кабинет</h2><div style="max-width:500px;margin:0 auto;"><div class="profile-banner-wrapper"><div class="profile-banner" style="background:${currentUser.profileColor||'#333'};"></div><div class="profile-avatar-container"><div class="avatar-upload" style="cursor:default;">${currentUser.avatar?'<img src="'+currentUser.avatar+'" alt="Аватар">':'<div class="avatar-placeholder"><i class="fas fa-user-circle"></i></div>'}</div></div></div><div class="profile-info-card"><p><span class="info-icon"><i class="fas fa-id-card"></i></span> <strong>Логин:</strong> ${currentUser.username} ${getRoleBadge(role)}</p><p><span class="info-icon"><i class="fas fa-user"></i></span> <strong>Видимый ник:</strong> ${dn}</p><p><span class="info-icon"><i class="fas fa-envelope"></i></span> <strong>Email:</strong> ${currentUser.email}</p><p style="font-size:0.9rem;color:#888;margin-top:10px;"><span class="info-icon"><i class="fas fa-clock"></i></span> Последний вход: ${new Date(currentUser.loginTime||Date.now()).toLocaleString('ru-RU')}</p></div></div><div class="profile-actions"><button class="back-btn" id="editProfileBtn"><i class="fas fa-edit"></i> Редактировать профиль</button><button class="back-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button><button class="back-btn" id="backToMainFromAccount">← На главную</button></div></div>`;
        }

        async function showUsersPage() {
            try {
                let users = [];
                try { const r = await api.getUsers(); users = r.users || []; } catch(e) { users = JSON.parse(localStorage.getItem('magicPedicUsers') || '[]'); }
                let html = '<div class="card"><h2><i class="fas fa-users"></i> Пользователи (' + users.length + ')</h2><p style="color:var(--text-secondary);">Нажмите на пользователя, чтобы посмотреть его профиль</p><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:20px;">';
                if (users.length === 0) html += '<p style="color:var(--text-secondary);text-align:center;grid-column:1/-1;">Пока нет зарегистрированных пользователей</p>';
                else users.forEach(u => { const role = getUserRole(u); html += `<div class="gallery-item" style="padding:15px;text-align:center;cursor:pointer;" onclick="showUserProfile('${u.email}')"><div style="width:60px;height:60px;border-radius:50%;margin:0 auto 10px;overflow:hidden;background:var(--input-bg);">${u.avatar?'<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;" alt="Аватар">':'<div style="font-size:2rem;color:#888;line-height:60px;"><i class="fas fa-user-circle"></i></div>'}</div><strong style="color:var(--text-primary);display:block;margin-bottom:5px;">${u.nickname||u.username}</strong>${getRoleBadge(role)}<p style="font-size:0.8rem;color:var(--text-secondary);margin-top:5px;">${u.status||'Нет статуса'}</p></div>`; });
                html += '</div><button class="back-btn" id="backToMainFromUsers" style="margin-top:20px;">← На главную</button></div>';
                return html;
            } catch(e) { return '<div class="card"><h2><i class="fas fa-users"></i> Пользователи</h2><p>Ошибка загрузки.</p><button class="back-btn" id="backToMainFromUsers">← На главную</button></div>'; }
        }

        async function promoteUserAPI(email, newRole) {
            try {
                await api.updateUserRole(email, newRole);
                const names = { vip: 'VIP', moderator: 'Модератор', user: 'Пользователь' };
                showToast('✅ Пользователь теперь ' + (names[newRole] || newRole), 2000);
                safeRemove('userProfileModal');
                if (currentPage === 'users') navigateTo('users');
            } catch(e) { showToast('❌ Ошибка: ' + (e.message || 'Нет прав'), 3000); }
        }
        function promoteUser(email, newRole) { promoteUserAPI(email, newRole); }

        function renderMainPage() { return '<div class="card"><h2><i class="fas fa-hand-peace"></i> Добро пожаловать!</h2><p>Приветствуем вас на главной страницы "Magic Pedic"! На данный момент, мы находимся на стадии разработки. Если есть какие-то вопросы, обращаться ко Владельцу! <strong>Заодно, оформите подписку на мой ТГК. И поставьте лайк сайту.</strong><br>Сделайте правильный выбор. Надеюсь, он вам понравится.</p><div class="choice-buttons"><button class="choice-btn" id="goToHellBtn"><i class="fas fa-skull"></i> Свино-девочки</button><button class="choice-btn blue" id="goToHeavenBtn"><i class="fas fa-dove"></i> Баунти</button></div></div>'; }
        function renderHellPage() { return '<div class="card"><h2><i class="fas fa-skull"></i> Свино-девочки, хрю-хрю~</h2><p>Вы выбрали "Свино-девочек". Интересный выбор..<br>Жми кнопку и насладись увиденным!</p><div><button class="single-action-btn hell-btn" id="hellSingleBtn"><i class="fas fa-fire"></i> Получить свино-девочек</button></div><button class="back-btn" id="backToMainFromHell">← На главную</button></div>'; }
        function renderHeavenPage() { return '<div class="card"><h2><i class="fas fa-heart"></i> Баунти, райское наслаждение.</h2><p>Так значит, вы любите шоколадки. Что ж..<br>Жми скорее кнопочку и насладись вкусностью!</p><div><button class="single-action-btn heaven-btn" id="heavenSingleBtn"><i class="fas fa-dove"></i> Откусить кусочек</button></div><button class="back-btn" id="backToMainFromHeaven">← На главную</button></div>'; }
        function renderAboutPage() { return '<div class="card"><h2><i class="fas fa-users"></i> О создателях</h2><p>Этот сайт сделали три умных мальчика, но сейчас его дорабатывает Константин Романович. Максим легенда.</p><div class="creators-grid"><div class="creator-card"><i class="fas fa-user-astronaut"></i><h3>Максимка</h3><p>Главный пусибой, харизматичный, все девочки с него текут.</p></div><div class="creator-card"><i class="fas fa-user-ninja"></i><h3>Костик</h3><p>Просто Костик. Ну там, давайте каточку в дотку?</p></div><div class="creator-card"><i class="fas fa-user-graduate"></i><h3>Ванечка</h3><p>Мрачный тип. Любит паркур.</p></div></div><button class="back-btn" id="backToMainFromAbout">← На главную</button></div>'; }
        function renderGalleryPage() { return '<div class="card"><h2><i class="fas fa-images"></i> Галерея Magic Pedic</h2><p>Коллекция эксклюзивных артов от нашей команды. Наслаждайтесь просмотром!</p><div id="galleryContent"></div></div>'; }

        const appContainer = document.getElementById('appContainer');
        function navigateTo(page, updateHistory = true) {
            const protectedPages = ['hell', 'heaven', 'about', 'gallery', 'account', 'users', 'friends'];
            if (protectedPages.includes(page) && !currentUser) { showToast('🔒 Пожалуйста, войдите или зарегистрируйтесь для доступа', 4000); setTimeout(() => showLoginModal(), 500); page = 'main'; }
            currentPage = page;
            let htmlContent = '';
            if (page === 'main') { htmlContent = renderMainPage(); document.title = 'Magic Pedic | Главная'; }
            else if (page === 'hell') { htmlContent = renderHellPage(); document.title = 'Свино-девочки ждут'; }
            else if (page === 'heaven') { htmlContent = renderHeavenPage(); document.title = 'Шоколадка баунти'; }
            else if (page === 'about') { htmlContent = renderAboutPage(); document.title = 'О создателях'; }
            else if (page === 'gallery') { htmlContent = renderGalleryPage(); document.title = 'Галерея'; }
            else if (page === 'account') { htmlContent = showAccountPage(); document.title = 'Личный кабинет'; }
            else if (page === 'users') { showUsersPage().then(c => { appContainer.innerHTML = c; attachEventListeners(); }); if (updateHistory) updateURL(page); return; }
            else if (page === 'friends') { showFriendsPage().then(c => { appContainer.innerHTML = c; attachEventListeners(); }); if (updateHistory) updateURL(page); return; }
            if (appContainer) { appContainer.innerHTML = htmlContent; if (updateHistory) updateURL(page); setTimeout(() => { attachEventListeners(); if (page === 'gallery') renderGalleryPageContent(); }, 50); }
        }

        function attachEventListeners() {
            const btns = {
                'goToHellBtn': 'hell', 'goToHeavenBtn': 'heaven',
                'backToMainFromHell': 'main', 'backToMainFromHeaven': 'main', 'backToMainFromAbout': 'main', 'backToMainFromAccount': 'main', 'backToMainFromUsers': 'main', 'backToMainFromFriends': 'main',
                'showLoginBtn': () => showLoginModal(), 'showRegBtn': () => showRegistrationModal(),
                'logoutBtn': () => logoutUser(), 'editProfileBtn': () => showEditProfileModal(), 'homeLink': () => navigateTo('main')
            };
            Object.keys(btns).forEach(id => { const el = document.getElementById(id); if (el) { if (typeof btns[id] === 'function') el.addEventListener('click', btns[id]); else el.addEventListener('click', () => navigateTo(btns[id])); } });
            const hellSingle = document.getElementById('hellSingleBtn'); if (hellSingle) hellSingle.addEventListener('click', e => { e.preventDefault(); window.open("https://www.youtube.com/watch?v=dQw4w9WgXcQ", "_blank"); showToast('Ты выбрал ад, рикролл обеспечен', 2800); });
            const heavenSingle = document.getElementById('heavenSingleBtn'); if (heavenSingle) heavenSingle.addEventListener('click', e => { e.preventDefault(); window.open("https://www.youtube.com/watch?v=J---aiyznGQ", "_blank"); showToast('Ты выбрал рай, тебя тут ждал Мили-Котек', 2500); });
        }

        function showEditProfileModal() { safeRemove('editProfileModal'); showToast('Редактирование профиля временно отключено', 3000); }
        async function renderGalleryPageContent() { /* заглушка */ }

        // ИНИЦИАЛИЗАЦИЯ
        document.getElementById('footerAboutBtn').addEventListener('click', () => navigateTo('about'));
        document.getElementById('galleryLink').addEventListener('click', () => navigateTo('gallery'));
        document.getElementById('accountLink').addEventListener('click', () => navigateTo('account'));
        document.getElementById('usersBtn').addEventListener('click', () => navigateTo('users'));
        document.getElementById('friendsBtn').addEventListener('click', () => navigateTo('friends'));
        document.getElementById('notificationsBtn').addEventListener('click', showNotifications);
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('playlistToggleBtn').addEventListener('click', togglePlaylist);
        document.querySelectorAll('.playlist-item').forEach((item, index) => item.addEventListener('click', () => switchTrack(index)));
        document.addEventListener('click', function(e) { /* закрытие панелей */ });

        function init() {
            currentUser = getUserData();
            const savedToken = localStorage.getItem('auth_token'); if (savedToken) api.setToken(savedToken);
            initTheme(); updateFooterDate(); updateNotificationBadge();
            navigateTo(getPageFromURL(), false);
            startPetals();
        }
        init();
    </script>
</body>
</html>
