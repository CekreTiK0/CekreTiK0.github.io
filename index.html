        async function showUserProfile(email) {
            safeRemove('userProfileModal');
            
            let user = null;
            try {
                const result = await api.getUserByEmail(email);
                user = result.user;
            } catch (err) {
                const users = JSON.parse(localStorage.getItem('magicPedicUsers') || '[]');
                user = users.find(function(u) { return u.email === email; });
            }
            
            if (!user) return;
            
            const role = getUserRole(user);
            const displayName = user.nickname || user.username;
            
            let modalHTML = '<div class="modal-overlay" id="userProfileModal" style="z-index:15000;">';
            modalHTML += '<div class="modal-content" style="max-width:500px;padding-top:20px;">';
            
            modalHTML += '<div style="position:relative;width:100%;margin-bottom:50px;">';
            modalHTML += '<div style="width:100%;height:180px;border-radius:20px;overflow:hidden;border:2px solid var(--border-color);background:' + (user.profile_color || user.profileColor || '#333') + ';">';
            modalHTML += (user.banner ? '<img src="' + user.banner + '" style="width:100%;height:100%;object-fit:cover;border-radius:18px;" alt="Баннер">' : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;color:#888;"><i class="fas fa-image"></i></div>');
            modalHTML += '</div>';
            
            modalHTML += '<div style="position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);z-index:5;">';
            modalHTML += '<div style="width:110px;height:110px;border-radius:50%;overflow:hidden;border:5px solid var(--card-bg);box-shadow:0 5px 20px rgba(0,0,0,0.4);background:var(--card-bg);">';
            modalHTML += (user.avatar ? '<img src="' + user.avatar + '" style="width:100%;height:100%;object-fit:cover;" alt="Аватар">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:#888;background:var(--input-bg);"><i class="fas fa-user-circle"></i></div>');
            modalHTML += '</div></div></div>';
            
            modalHTML += '<div style="margin-top:60px;text-align:center;">';
            modalHTML += '<h2 style="color:var(--text-primary);margin-bottom:5px;">' + displayName + ' ' + getRoleBadge(role) + '</h2>';
            modalHTML += '<p style="color:var(--text-secondary);">@' + user.username + '</p>';
            
            if (user.status) modalHTML += '<p style="color:var(--text-secondary);font-style:italic;">"' + user.status + '"</p>';
            if (user.description) modalHTML += '<p style="color:var(--text-secondary);font-size:0.9rem;margin-top:10px;">' + user.description + '</p>';
            if (user.birthday) modalHTML += '<p style="color:var(--text-secondary);">🎂 ' + user.birthday + '</p>';
            
            modalHTML += '<p style="color:#888;font-size:0.8rem;">📅 Регистрация: ' + new Date(user.registered_at || Date.now()).toLocaleDateString('ru-RU') + '</p>';
            modalHTML += '</div>';
            
            modalHTML += '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px;">';
            
            if (currentUser && currentUser.email !== email) {
                modalHTML += '<button class="friend-action-btn add-friend" onclick="addFriend(\'' + email + '\');safeRemove(\'userProfileModal\');"><i class="fas fa-user-plus"></i> Добавить в друзья</button>';
            }
            
            if (isOwner(currentUser)) {
                if (getUserRole(user) === ROLES.USER) {
                    modalHTML += '<button class="modal-btn primary" onclick="promoteUserAPI(\'' + email + '\',\'vip\')" style="flex:1;"><i class="fas fa-star"></i> Повысить до VIP</button>';
                    modalHTML += '<button class="modal-btn primary" onclick="promoteUserAPI(\'' + email + '\',\'moderator\')" style="flex:1;"><i class="fas fa-shield-alt"></i> Сделать модером</button>';
                }
                if (getUserRole(user) === ROLES.VIP) {
                    modalHTML += '<button class="modal-btn secondary" onclick="promoteUserAPI(\'' + email + '\',\'user\')" style="flex:1;">Снять VIP</button>';
                    modalHTML += '<button class="modal-btn primary" onclick="promoteUserAPI(\'' + email + '\',\'moderator\')" style="flex:1;"><i class="fas fa-shield-alt"></i> Сделать модером</button>';
                }
                if (getUserRole(user) === ROLES.MODERATOR) {
                    modalHTML += '<button class="modal-btn danger" onclick="promoteUserAPI(\'' + email + '\',\'user\')" style="flex:1;">Снять модера</button>';
                }
            }
            
            modalHTML += '<button class="modal-btn secondary" onclick="safeRemove(\'userProfileModal\')" style="flex:1;">Закрыть</button>';
            modalHTML += '</div>';
            modalHTML += '</div></div>';
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            const userProfileModal = document.getElementById('userProfileModal');
            if (userProfileModal) {
                userProfileModal.addEventListener('click', function(e) {
                    if (e.target === this) safeRemove('userProfileModal');
                });
            }
        }

        const appContainer = document.getElementById('appContainer');

        function attachEventListeners() {
            const goToHell = document.getElementById('goToHellBtn');
            const goToHeaven = document.getElementById('goToHeavenBtn');
            if (goToHell) goToHell.addEventListener('click', function() { navigateTo('hell'); });

        function navigateTo(page, updateHistory = true) {
            const protectedPages = ['hell', 'heaven', 'about', 'gallery', 'account', 'users', 'friends'];
            
            if (protectedPages.includes(page) && !currentUser) {
                showToast('🔒 Пожалуйста, войдите или зарегистрируйтесь для доступа', 4000);
                
                setTimeout(function() {
                    showLoginModal();
                }, 500);
                
                page = 'main';
            }
            
            currentPage = page;
            let htmlContent = '';
            
            if (page === 'main') { htmlContent = renderMainPage(); document.title = 'Magic Pedic | Главная'; }
            else if (page === 'hell') { htmlContent = renderHellPage(); document.title = 'Свино-девочки ждут'; }
            else if (page === 'heaven') { htmlContent = renderHeavenPage(); document.title = 'Шоколадка баунти'; }
            else if (page === 'about') { htmlContent = renderAboutPage(); document.title = 'О создателях'; }
            else if (page === 'gallery') { htmlContent = renderGalleryPage(); document.title = 'Галерея'; }
            else if (page === 'account') { htmlContent = showAccountPage(); document.title = 'Личный кабинет'; }
            else if (page === 'users') { 
                showUsersPage().then(function(content) {
                    appContainer.innerHTML = content;
                    attachEventListeners();
                });
                if (updateHistory) updateURL(page);
                return;
            }
            else if (page === 'friends') { 
                showFriendsPage().then(function(content) {
                    appContainer.innerHTML = content;
                    attachEventListeners();
                });
                if (updateHistory) updateURL(page);
                return;
            }
            
            if (appContainer) {
                appContainer.innerHTML = htmlContent;
                if (updateHistory) {
                    updateURL(page);
                }
                setTimeout(function() {
                    attachEventListeners();
                    if (page === 'gallery') renderGalleryPageContent();
                }, 50);
            }
        }

        document.getElementById('footerAboutBtn').addEventListener('click', function() {
            navigateTo('about');
        });

        document.getElementById('galleryLink').addEventListener('click', function() {
            navigateTo('gallery');
        });

        document.getElementById('accountLink').addEventListener('click', function() {
            navigateTo('account');
        });

        document.getElementById('usersBtn').addEventListener('click', function() {
            navigateTo('users');
        });

        document.getElementById('friendsBtn').addEventListener('click', function() {

        });

        document.getElementById('notificationsBtn').addEventListener('click', function() {

        });

        document.getElementById('themeToggle').addEventListener('click', function() {

        });

        document.getElementById('playlistToggleBtn').addEventListener('click', function() {
            togglePlaylist();
        });

        document.querySelectorAll('.playlist-item').forEach(function(item, index) {
            item.addEventListener('click', function() {
                switchTrack(index);
            });
        });

        document.addEventListener('click', function(e) {
            const notifPanel = document.getElementById('notificationPanel');
            const notifBtn = document.getElementById('notificationsBtn');
            const playlistPanel = document.getElementById('playlistPanel');
            const playlistBtn = document.getElementById('playlistToggleBtn');
            
            if (notifPanel && notifPanel.style.display === 'block') {
                if (!notifPanel.contains(e.target) && e.target !== notifBtn && !notifBtn.contains(e.target)) {
                    notifPanel.style.display = 'none';
                }
            }
            
            if (playlistPanel && playlistPanel.style.display === 'block') {
                if (!playlistPanel.contains(e.target) && e.target !== playlistBtn && !playlistBtn.contains(e.target)) {
                    playlistPanel.style.display = 'none';
                }
            }
        });

        function init() {
            currentUser = getUserData();
            
            const savedToken = localStorage.getItem('auth_token');
            if (savedToken) {
                api.setToken(savedToken);
            }
            
            initTheme();
            updateFooterDate();
            updateNotificationBadge();
            
            const pageFromURL = getPageFromURL();
            navigateTo(pageFromURL, false);
            
            startPetals();
        }

        init();
    </script>
