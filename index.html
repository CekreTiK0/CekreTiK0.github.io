<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Magic Pedic</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-overlay: rgba(0, 0, 0, 0.75);
            --card-bg: rgba(30, 30, 30, 0.95);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #888888;
            --input-bg: rgba(255, 255, 255, 0.08);
            --header-bg-start: #1a1a1a;
            --header-bg-end: #0d0d0d;
            --footer-bg: rgba(13, 13, 13, 0.9);
            --creator-card-bg: #252525;
            --gallery-item-bg: #252525;
            --modal-bg-start: #1a1a1a;
            --modal-bg-end: #2a2a2a;
            --toast-bg: #1f1f1f;
            --btn-secondary-bg: #2a2a2a;
            --notif-bg: rgba(30, 30, 30, 0.98);
            --notif-text: #ffffff;
            --notif-time: #aaaaaa;
            --notif-border: #555555;
            --profile-info-bg: rgba(255, 255, 255, 0.06);
        }

        body.light-theme {
            --bg-overlay: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(245, 245, 245, 0.95);
            --text-primary: #1a1a1a;
            --text-secondary: #444444;
            --border-color: #cccccc;
            --input-bg: rgba(0, 0, 0, 0.05);
            --header-bg-start: #f5f5f5;
            --header-bg-end: #e8e8e8;
            --footer-bg: rgba(245, 245, 245, 0.9);
            --creator-card-bg: #ffffff;
            --gallery-item-bg: #ffffff;
            --modal-bg-start: #f5f5f5;
            --modal-bg-end: #ededed;
            --toast-bg: #f0f0f0;
            --btn-secondary-bg: #e0e0e0;
            --notif-bg: rgba(255, 255, 255, 0.98);
            --notif-text: #1a1a1a;
            --notif-time: #666666;
            --notif-border: #cccccc;
            --profile-info-bg: rgba(0, 0, 0, 0.03);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('my-background.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes galleryFadeIn { from { opacity: 0; transform: scale(0.8) rotateY(10deg); } to { opacity: 1; transform: scale(1) rotateY(0deg); } }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.85) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes codePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes lightboxFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes notificationSlideIn { from { opacity: 0; transform: translateX(60px); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; } to { opacity: 1; transform: translateX(0); max-height: 200px; margin-bottom: 10px; padding-top: 14px; padding-bottom: 14px; } }
        @keyframes bellShake { 0%, 100% { transform: rotate(0deg) scale(1); } 10% { transform: rotate(15deg) scale(1.1); } 20% { transform: rotate(-15deg) scale(1.15); } 30% { transform: rotate(10deg) scale(1.1); } 40% { transform: rotate(-10deg) scale(1.05); } 50% { transform: rotate(5deg) scale(1); } 60% { transform: rotate(-5deg); } 70% { transform: rotate(0deg); } }

        .card { animation: fadeInUp 0.7s ease-out; }
        .creator-card { animation: fadeInScale 0.5s ease-out; }
        .creator-card:nth-child(1) { animation-delay: 0.1s; }
        .creator-card:nth-child(2) { animation-delay: 0.2s; }
        .creator-card:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item { animation: galleryFadeIn 0.6s ease-out; }
        .gallery-item:nth-child(1) { animation-delay: 0.05s; }
        .gallery-item:nth-child(2) { animation-delay: 0.1s; }
        .gallery-item:nth-child(3) { animation-delay: 0.15s; }
        .gallery-item:nth-child(4) { animation-delay: 0.2s; }
        .gallery-item:nth-child(5) { animation-delay: 0.25s; }
        .gallery-item:nth-child(6) { animation-delay: 0.3s; }
        .gallery-item:nth-child(7) { animation-delay: 0.35s; }
        .gallery-item:nth-child(8) { animation-delay: 0.4s; }
        .choice-btn { animation: slideInLeft 0.6s ease-out; }
        .choice-btn.blue { animation: slideInRight 0.6s ease-out; }

        .petal-anime {
            position: fixed; top: -30px; pointer-events: none; z-index: 9999;
            will-change: transform, opacity; filter: drop-shadow(0 0 5px rgba(200, 200, 200, 0.6));
        }

        @keyframes fallAnime {
            0% { transform: translateY(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(0); opacity: 0.9; }
            20% { transform: translateY(20vh) rotateX(45deg) rotateY(30deg) rotateZ(60deg) translateZ(10px); opacity: 0.85; }
            40% { transform: translateY(40vh) rotateX(90deg) rotateY(60deg) rotateZ(120deg) translateZ(5px); opacity: 0.75; }
            60% { transform: translateY(60vh) rotateX(135deg) rotateY(90deg) rotateZ(180deg) translateZ(-5px); opacity: 0.55; }
            80% { transform: translateY(80vh) rotateX(180deg) rotateY(120deg) rotateZ(240deg) translateZ(-10px); opacity: 0.3; }
            100% { transform: translateY(100vh) rotateX(225deg) rotateY(150deg) rotateZ(300deg) translateZ(-15px); opacity: 0; }
        }

        .header {
            background: linear-gradient(135deg, var(--header-bg-start) 0%, var(--header-bg-end) 100%);
            padding: 20px 40px; display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--border-color); z-index: 10;
        }

        .logo-left {
            position: absolute; left: 40px; color: var(--text-secondary); font-weight: bold;
            font-size: 1.6rem; letter-spacing: 1px; background: rgba(128, 128, 128, 0.1);
            padding: 6px 14px; border-radius: 40px; backdrop-filter: blur(4px);
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(128, 128, 128, 0.3);
        }

        .logo-left:hover { background: rgba(128, 128, 128, 0.3); color: var(--text-primary); transform: scale(1.05); }
        .logo-left i { margin-right: 8px; }

        .nav-links { position: absolute; right: 40px; display: flex; gap: 12px; align-items: center; }

        .nav-link {
            color: var(--text-secondary); text-decoration: none; font-weight: 600;
            padding: 8px 16px; border-radius: 20px; transition: all 0.3s ease;
            border: 1px solid rgba(128, 128, 128, 0.3); background: rgba(128, 128, 128, 0.1);
            cursor: pointer; font-size: 0.9rem; white-space: nowrap;
        }

        .nav-link:hover { background: rgba(128, 128, 128, 0.3); color: var(--text-primary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .nav-link i { margin-right: 5px; }

        .header h1 {
            font-size: 2.2rem; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff, #888888, #cccccc, #666666, #ffffff);
            background-size: 200% auto;
            background-clip: text; -webkit-background-clip: text;
            color: transparent; animation: shimmer 6s linear infinite; margin: 0;
        }

        .theme-toggle {
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            border: 1px solid var(--border-color); background: var(--input-bg);
            color: var(--text-secondary); display: flex; align-items: center;
            justify-content: center; transition: all 0.3s ease; font-size: 1.1rem;
        }

        .theme-toggle:hover { background: rgba(128, 128, 128, 0.3); color: var(--text-primary); transform: rotate(30deg); }

        .role-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; display: inline-block; margin-left: 5px; letter-spacing: 0.5px; }
        .role-owner { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
        .role-moderator { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: #fff; }
        .role-vip { background: linear-gradient(135deg, #9C27B0, #6A1B9A); color: #fff; }
        .role-user { background: #555; color: #ccc; }

        .friend-action-btn { padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-secondary); margin: 5px; }
        .friend-action-btn.add-friend { background: rgba(76, 175, 80, 0.2); border-color: #4CAF50; color: #4CAF50; }
        .friend-action-btn.add-friend:hover { background: rgba(76, 175, 80, 0.4); }
        .friend-action-btn.remove-friend { background: rgba(244, 67, 54, 0.2); border-color: #f44336; color: #f44336; }
        .friend-action-btn.remove-friend:hover { background: rgba(244, 67, 54, 0.4); }

        .profile-banner-wrapper { position: relative; width: 100%; padding-bottom: 50px; }
        .profile-banner { width: 100%; height: 200px; border-radius: 20px; object-fit: cover; background: linear-gradient(135deg, #333, #555); display: flex; align-items: center; justify-content: center; color: #888; font-size: 3rem; overflow: hidden; border: 2px solid var(--border-color); }
        .profile-banner img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }
        .profile-avatar-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 5; }
        .avatar-upload { width: 120px; height: 120px; border-radius: 50%; position: relative; cursor: pointer; overflow: hidden; border: 5px solid var(--card-bg); transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4); background: var(--card-bg); }
        .avatar-upload:hover { border-color: #ffffff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); transform: scale(1.05); }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload .avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: #888; background: var(--input-bg); }
        .avatar-upload .avatar-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.75); color: white; text-align: center; padding: 8px; font-size: 0.75rem; opacity: 0; transition: opacity 0.3s ease; }
        .avatar-upload:hover .avatar-overlay { opacity: 1; }
        .profile-user-info { margin-top: 70px; text-align: center; }
        .profile-user-info h2 { margin-bottom: 5px; }

        .profile-info-card { background: var(--profile-info-bg); border: 1px solid rgba(128, 128, 128, 0.2); border-radius: 20px; padding: 30px; margin-top: 10px; }
        .profile-info-card p { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .profile-info-card p:last-child { margin-bottom: 0; }
        .profile-info-card .info-icon { width: 20px; text-align: center; flex-shrink: 0; }
        .profile-actions { margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        .nickname-change-info { color: #888; font-size: 0.8rem; margin-top: 5px; text-align: center; }
        .nickname-change-info .can-change { color: #4CAF50; }
        .nickname-change-info .cannot-change { color: #f44336; }

        .code-input-group { display: flex; gap: 12px; justify-content: center; margin: 25px 0; }

        .code-input {
            width: 55px !important; height: 65px !important; text-align: center;
            font-size: 1.8rem !important; font-weight: 700;
            border-radius: 15px !important; border: 2px solid var(--border-color) !important;
            background: var(--input-bg) !important; color: var(--text-primary) !important;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            font-family: 'Courier New', monospace; letter-spacing: 2px;
        }

        .code-input:focus {
            border-color: #ffffff !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 4px 15px rgba(0, 0, 0, 0.2) !important;
            transform: scale(1.05); background: rgba(255, 255, 255, 0.15) !important;
        }

        .code-input.filled { border-color: #4CAF50 !important; box-shadow: 0 0 15px rgba(76, 175, 80, 0.3) !important; }
        .code-input.error { border-color: #f44336 !important; box-shadow: 0 0 15px rgba(244, 67, 54, 0.3) !important; animation: shake 0.5s ease; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .verification-info { text-align: center; margin-bottom: 20px; color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; }
        .verification-info strong { color: var(--text-primary); font-size: 1.05rem; }
        .verification-icon { font-size: 3rem; color: var(--border-color); display: block; margin-bottom: 15px; animation: codePulse 2s infinite; }
        .resend-link { color: var(--text-primary); cursor: pointer; text-decoration: underline; font-weight: 600; transition: color 0.3s ease; font-size: 0.9rem; }
        .resend-link:hover { color: #ffffff; }
        .verification-timer { color: #888; font-size: 0.8rem; margin-top: 8px; }

        .edit-gallery-btn {
            position: absolute; top: 10px; right: 50px;
            background: rgba(33, 150, 243, 0.8); color: white; border: none;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        .edit-gallery-btn:hover { background: rgba(33, 150, 243, 1); transform: scale(1.15); }

        .notification-panel { position: fixed; top: 90px; right: 25px; z-index: 9500; max-width: 380px; width: 95%; max-height: 70vh; overflow-y: auto; scroll-behavior: smooth; }
        .notification-panel::-webkit-scrollbar { width: 5px; }
        .notification-panel::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .notification-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .notification-panel-container { background: var(--notif-bg); border: 2px solid var(--notif-border); border-radius: 15px; padding: 15px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5); animation: fadeInUp 0.3s ease-out; }
        .notification-panel-title { color: var(--text-primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 15px; text-align: center; padding-bottom: 10px; border-bottom: 1px solid var(--notif-border); }
        .notification-item { background: var(--input-bg); border: 1px solid rgba(128, 128, 128, 0.2); padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); animation: notificationSlideIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; opacity: 0; transform: translateX(50px); }
        .notification-item:nth-child(1) { animation-delay: 0.05s; }
        .notification-item:nth-child(2) { animation-delay: 0.1s; }
        .notification-item:nth-child(3) { animation-delay: 0.15s; }
        .notification-item:nth-child(4) { animation-delay: 0.2s; }
        .notification-item:nth-child(5) { animation-delay: 0.25s; }
        .notification-item:hover { transform: translateX(-10px) scale(1.02); border-color: #ffffff; background: rgba(128, 128, 128, 0.2); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .notification-item:active { transform: translateX(-10px) scale(0.98); transition: all 0.1s ease; }
        .notification-item .notif-type { color: var(--text-primary); font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .notification-item .notif-type::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; display: inline-block; box-shadow: 0 0 8px rgba(76, 175, 80, 0.6); }
        .notification-item .notif-message { color: var(--notif-text); font-size: 0.85rem; opacity: 0.9; line-height: 1.4; }
        .notification-item .notif-time { font-size: 0.7rem; color: var(--notif-time); margin-top: 6px; display: flex; align-items: center; gap: 5px; }
        .notification-item .notif-time::before { content: '\f017'; font-family: 'Font Awesome 6 Free'; font-weight: 400; font-size: 0.65rem; }
        .notification-badge { position: absolute; top: -10px; right: -10px; background: #ff4444; color: white; border-radius: 50%; min-width: 22px; height: 22px; font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(255, 0, 0, 0.5); animation: bellShake 0.6s ease-in-out; pointer-events: none; }

        .playlist-panel { position: fixed; bottom: 200px; right: 25px; z-index: 100; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 15px; padding: 15px; max-width: 220px; width: 100%; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); animation: fadeInUp 0.3s ease-out; }
        .playlist-title { color: var(--text-primary); font-weight: 700; margin-bottom: 10px; text-align: center; font-size: 0.95rem; }
        .playlist-item { padding: 10px 14px; cursor: pointer; border-radius: 10px; transition: all 0.3s ease; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .playlist-item:hover { background: var(--input-bg); color: var(--text-primary); transform: translateX(-5px); }
        .playlist-item.active { background: rgba(255, 255, 255, 0.15); color: #ffffff; font-weight: 600; border-left: 3px solid #ffffff; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; animation: fadeInUp 0.3s ease-out; }
        .modal-content { background: linear-gradient(135deg, var(--modal-bg-start), var(--modal-bg-end)); border-radius: 20px; padding: 40px; width: 90%; max-width: 420px; border: 2px solid var(--border-color); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); animation: modalFadeIn 0.4s ease-out; }
        .modal-content h2 { color: var(--text-primary); margin-bottom: 25px; text-align: center; font-size: 1.8rem; }
        .modal-content h2 i { color: var(--border-color); margin-right: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 1rem; transition: all 0.3s ease; outline: none; font-family: inherit; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.12); }

        .modal-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .modal-btn { flex: 1; padding: 13px; border-radius: 10px; border: 1px solid var(--border-color); font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 1rem; }
        .modal-btn.primary { background: #ffffff; color: #000000; border-color: #ffffff; }
        .modal-btn.primary:hover { background: #e0e0e0; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .modal-btn.secondary { background: transparent; color: var(--text-secondary); }
        .modal-btn.secondary:hover { background: var(--input-bg); transform: translateY(-3px); color: var(--text-primary); }
        .modal-btn.danger { background: rgba(255, 0, 0, 0.2); color: #ff6666; border-color: #ff4444; }
        .modal-btn.danger:hover { background: rgba(255, 0, 0, 0.4); color: #ffffff; }

        .forgot-password { text-align: center; margin-top: 15px; color: #888; }
        .forgot-password span { color: #ffffff; cursor: pointer; text-decoration: underline; font-weight: 600; transition: color 0.3s ease; }
        .forgot-password span:hover { color: #cccccc; }

        .music-player-panel { position: fixed; bottom: 110px; left: 25px; z-index: 100; }
        .music-control-row { display: flex; align-items: center; gap: 10px; background: var(--card-bg); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 50px; border: 2px solid var(--border-color); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); transition: all 0.3s ease; }
        .music-control-btn { width: 40px; height: 40px; background: var(--input-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 1.2rem; transition: all 0.3s ease; }
        .music-control-btn:hover { background: #ffffff; color: #000000; transform: scale(1.1); }
        .volume-slider-container { display: flex; align-items: center; gap: 8px; }
        .volume-icon { color: var(--text-secondary); font-size: 0.9rem; }
        .volume-slider { -webkit-appearance: none; width: 90px; height: 5px; background: linear-gradient(to right, #666666, #cccccc); border-radius: 5px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; border: 2px solid #888888; box-shadow: 0 0 6px rgba(255, 255, 255, 0.5); cursor: pointer; transition: 0.2s; }
        .seek-bar-container { width: 160px; display: flex; align-items: center; gap: 8px; }

    <script>
        class ApiClient {
            constructor() {
                this.baseUrl = 'https://magic-pedic-api.onrender.com/api';
                this.token = localStorage.getItem('auth_token');
            }

            setToken(token) {
                this.token = token;
                if (token) {
                    localStorage.setItem('auth_token', token);
                } else {
                    localStorage.removeItem('auth_token');
                }
            }

            async request(method, endpoint, data = null) {
                const options = {
                    method,
                    headers: {}
                };

                if (this.token) {
                    options.headers['Authorization'] = 'Bearer ' + this.token;
                }

                if (data && !(data instanceof FormData)) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                } else if (data instanceof FormData) {
                    options.body = data;
                }

                try {
                    const response = await fetch(this.baseUrl + endpoint, options);
                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.error || 'Ошибка сервера');
                    }

                    return result;
                } catch (err) {
                    console.error('API Error:', err);
                    throw err;
                }
            }

            async register(email, username, password) {
                return this.request('POST', '/register', { email, username, password });
            }

            async login(email, password) {
                const result = await this.request('POST', '/login', { email, password });
                if (result.token) {
                    this.setToken(result.token);
                    currentUser = result.user;
                    localStorage.setItem('magicPedicUser', JSON.stringify(result.user));
                }
                return result;
            }

            async getProfile() {
                const result = await this.request('GET', '/profile');
                if (result.user) {
                    currentUser = result.user;
                    localStorage.setItem('magicPedicUser', JSON.stringify(result.user));
                }
                return result;
            }

            async updateProfile(data) {
                const result = await this.request('PUT', '/profile', data);
                if (result.success) {
                    await this.getProfile();
                }
                return result;
            }

            async getGallery() {
                return this.request('GET', '/gallery');
            }

            async addGalleryImage(imageFile, title, description) {
                const formData = new FormData();
                formData.append('image', imageFile);
                formData.append('title', title);
                formData.append('description', description || '');
                return this.request('POST', '/gallery', formData);
            }

            async deleteGalleryImage(imageId) {
                return this.request('DELETE', '/gallery/' + imageId);
            }

            async updateGalleryImage(imageId, data) {
                return this.request('PUT', '/gallery/' + imageId, data);
            }

            async getUsers() {
                return this.request('GET', '/users');
            }

            async getUserByEmail(email) {
                return this.request('GET', '/users/email/' + encodeURIComponent(email));
            }

            async addFriend(friendId) {
                return this.request('POST', '/friends/add', { friendId: friendId });
            }

            async removeFriend(friendId) {
                return this.request('DELETE', '/friends/remove', { friendId: friendId });
            }

            async getFriends() {
                return this.request('GET', '/friends');
            }

            async getNotifications() {
                return this.request('GET', '/notifications');
            }

            async markNotificationRead(notificationId) {
                return this.request('PUT', '/notifications/' + notificationId + '/read');
            }

            async clearNotifications() {
                return this.request('DELETE', '/notifications');
            }

            async sendVerificationCode(email, username) {
                return this.request('POST', '/verify/send-code', { email, username });
            }

            async verifyCode(email, code) {
                return this.request('POST', '/verify/check-code', { email, code });
            }

            async resetPassword(email, code, newPassword) {
                return this.request('POST', '/reset-password', { email, code, newPassword });
            }

            async updateUserRole(userEmail, newRole) {
                return this.request('PUT', '/admin/role', { email: userEmail, role: newRole });
            }

            async blockUser(userEmail) {
                return this.request('PUT', '/admin/block', { email: userEmail });
            }

            async unblockUser(userEmail) {
                return this.request('PUT', '/admin/unblock', { email: userEmail });
            }

            logout() {
                this.setToken(null);
                localStorage.removeItem('magicPedicUser');
                currentUser = null;
            }
        }

        const api = new ApiClient();
    </script>

                if (!isOwner) {
                    e.preventDefault();

            });

        const EMAILJS_CONFIG = {

        };

            blocked: 'Заблокирован'
        };

        const OWNER_EMAIL = 'gorevkr2007@gmail.com';

        const PLAYLIST = [
            { title: 'Песенка №1', file: 'my-music.mp3', icon: 'fa-music' },
            { title: 'Песенка №2', file: 'my-music2.mp3', icon: 'fa-headphones' },
            { title: 'Песенка №3', file: 'my-music3.mp3', icon: 'fa-guitar' }
        ];

        let currentUser = null;
        let currentPage = 'main';
        let currentLightboxIndex = 0;
        let notifications = [];
        let currentTrackIndex = 0;
        let isMusicPlaying = false;
        let musicStarted = false;

        (function() {
            emailjs.init(EMAILJS_CONFIG.publicKey);

        function sendEmail(templateID, templateParams) {
            return emailjs.send(EMAILJS_CONFIG.serviceID, templateID, templateParams)
                .then(function(response) {
                    console.log('✅ Email отправлен!', response.status);
                    return true;
                })
                .catch(function(error) {
                    console.error('❌ Ошибка отправки:', error);
                    return false;
                });
        }

        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateURL(page) {
            const base = window.location.pathname.split('/').pop().split('.')[0];
            const newURL = page === 'main' ? window.location.pathname : `?page=${page}`;
            window.history.pushState({page: page}, '', newURL);
        }

        function getPageFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('page') || 'main';
        }

        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.page) {
                navigateTo(e.state.page, false);
            } else {
                navigateTo('main', false);
            }
        });

        function safeRemove(id) {
            const el = document.getElementById(id);
            if (el && el.parentNode) {
                el.remove();
            }
        }

        async function getFriendsList() {
            if (!currentUser) return [];
            
            try {
                const result = await api.getFriends();
                return result.friends || [];
            } catch (err) {
                console.error('Ошибка загрузки друзей:', err);
                return [];
            }
        }

        async function areFriends(email2) {
            if (!currentUser) return false;
            
            try {
                const friends = await getFriendsList();
                return friends.some(function(f) { return f.email === email2; });
            } catch (err) {
                return false;
            }
        }

        async function addFriend(friendEmail) {
            if (!currentUser) return false;
            
            if (currentUser.email === friendEmail) {
                showToast('❌ Нельзя добавить себя в друзья', 3000);
                return false;
            }
            
            try {
                const userResult = await api.getUserByEmail(friendEmail);
                if (!userResult.user) {
                    showToast('❌ Пользователь не найден', 3000);
                    return false;
                }
                
                await api.addFriend(userResult.user.id);
                
                const friendName = userResult.user.nickname || userResult.user.username;
                showToast('✅ ' + friendName + ' добавлен в друзья!', 3000);
                addNotification('👥 Друзья', 'Вы добавили в друзья: ' + friendName);
                
                return true;
            } catch (err) {
                showToast('❌ ' + (err.message || 'Ошибка при добавлении в друзья'), 3000);
                return false;
            }
        }

        async function removeFriend(friendEmail) {
            if (!currentUser) return false;
            
            try {
                const userResult = await api.getUserByEmail(friendEmail);
                if (!userResult.user) {
                    showToast('❌ Пользователь не найден', 3000);
                    return false;
                }
                
                await api.removeFriend(userResult.user.id);
                
                const friendName = userResult.user.nickname || userResult.user.username;
                showToast('✅ ' + friendName + ' удалён из друзей', 3000);
                return true;
            } catch (err) {
                showToast('❌ Ошибка при удалении из друзей', 3000);
                return false;
            }
        }

        async function showFriendsPage() {
            if (!currentUser) {
                return '<div class="card"><h2><i class="fas fa-user-friends"></i> Друзья</h2><p>Войдите в аккаунт, чтобы увидеть список друзей.</p><button class="back-btn" id="backToMainFromFriends">← На главную</button></div>';
            }
            
            try {
                const friends = await getFriendsList();
                
                let html = '<div class="card"><h2><i class="fas fa-user-friends"></i> Мои друзья (' + friends.length + ')</h2>';
                
                if (friends.length === 0) {
                    html += '<p style="color:var(--text-secondary);">У вас пока нет друзей. Найдите их на странице пользователей!</p>';
                } else {
                    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:20px;">';
                    
                    friends.forEach(function(friend) {
                        const displayName = friend.nickname || friend.username;
                        const role = friend.role || ROLES.USER;
                        
                        html += '<div class="gallery-item" style="padding:15px;text-align:center;cursor:pointer;" onclick="showUserProfile(\'' + friend.email + '\')">';
                        html += '<div style="width:60px;height:60px;border-radius:50%;margin:0 auto 10px;overflow:hidden;background:var(--input-bg);">';
                        
                        if (friend.avatar) {
                            html += '<img src="' + friend.avatar + '" style="width:100%;height:100%;object-fit:cover;" alt="Аватар">';
                        } else {
                            html += '<div style="font-size:2rem;color:#888;line-height:60px;"><i class="fas fa-user-circle"></i></div>';
                        }
                        
                        html += '</div>';
                        html += '<strong style="color:var(--text-primary);display:block;margin-bottom:5px;">' + displayName + '</strong>';
                        html += getRoleBadge(role);
                        html += '<p style="font-size:0.8rem;color:var(--text-secondary);margin-top:5px;">' + (friend.status || 'Нет статуса') + '</p>';
                        html += '<button class="friend-action-btn remove-friend" onclick="event.stopPropagation();removeFriend(\'' + friend.email + '\');navigateTo(\'friends\');" style="margin-top:8px;"><i class="fas fa-user-minus"></i> Удалить</button>';
                        html += '</div>';
                    });
                    
                    html += '</div>';
                }
                
                html += '<button class="back-btn" id="backToMainFromFriends" style="margin-top:20px;">← На главную</button></div>';
                
                return html;
            } catch (err) {
                return '<div class="card"><h2><i class="fas fa-user-friends"></i> Друзья</h2><p>Ошибка загрузки списка друзей.</p><button class="back-btn" id="backToMainFromFriends">← На главную</button></div>';
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('magicPedicTheme');
            const themeToggle = document.getElementById('themeToggle');
            
            if (saved === 'light') {
                document.body.classList.add('light-theme');
                if (themeToggle) themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('magicPedicTheme', isLight ? 'light' : 'dark');
            
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
            
            showToast(isLight ? '☀️ Светлая тема включена' : '🌙 Тёмная тема включена', 2000);
        }

        function getUserRole(user) {
            if (!user) return ROLES.USER;
            if (user.is_blocked || user.role === 'blocked') return ROLES.BLOCKED;
            if (user.email === OWNER_EMAIL || user.role === 'owner') return ROLES.OWNER;
            if (user.role === 'moderator') return ROLES.MODERATOR;
            if (user.role === 'vip') return ROLES.VIP;
            return ROLES.USER;
        }

        function getRoleBadge(role) {
            const classes = {
                owner: 'role-owner',
                moderator: 'role-moderator',
                vip: 'role-vip',
                user: 'role-user',
                blocked: 'role-user'
            };
            
            const names = {
                owner: 'Владелец',
                moderator: 'Модератор',
                vip: 'VIP',
                user: 'Пользователь',
                blocked: 'Заблокирован'
            };
            
            return `<span class="role-badge ${classes[role] || 'role-user'}">${names[role] || 'Пользователь'}</span>`;
        }

        function isAdmin(user) {
            const role = getUserRole(user);
            return role === ROLES.OWNER || role === ROLES.MODERATOR;
        }

        function isOwner(user) {
            return user && user.email === OWNER_EMAIL;
        }

        function addNotification(type, message, link) {
            notifications.unshift({
                type: type,
                message: message,
                link: link || null,
                time: new Date().toISOString(),
                read: false
            });
            
            if (notifications.length > 50) {
                notifications.pop();
            }
            
            updateNotificationBadge();
        }

        function updateNotificationBadge() {
            const unreadCount = notifications.filter(function(n) { return !n.read; }).length;
            const badge = document.getElementById('notifBadge');
            
            if (!badge) return;
            
            if (unreadCount > 0) {
                badge.style.display = 'flex';
                badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                badge.style.animation = 'none';
                setTimeout(function() {
                    badge.style.animation = 'bellShake 0.6s ease-in-out';
                }, 10);
            } else {
                badge.style.display = 'none';
            }
        }

        function clearNotifications() {
            notifications = [];
            updateNotificationBadge();
            showToast('✅ Все уведомления очищены', 2000);
            document.getElementById('notificationPanel').style.display = 'none';
            
            if (currentUser) {
                api.clearNotifications().catch(function() {});
            }
        }

        function showNotifications() {
            const panel = document.getElementById('notificationPanel');
            
            if (!panel) return;
            
            if (panel.style.display === 'none' || panel.style.display === '') {
                let html = '<div class="notification-panel-container">';
                html += '<div class="notification-panel-title"><i class="fas fa-bell"></i> Уведомления</div>';
                
                if (notifications.length === 0) {
                    html += '<div style="text-align:center;padding:30px 20px;color:var(--text-secondary);">';
                    html += '<i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.5;"></i>';
                    html += '<p>Нет новых уведомлений</p>';
                    html += '</div>';
                } else {
                    notifications.slice(0, 30).forEach(function(n) {
                        html += '<div class="notification-item"';
                        if (n.link) {
                            html += ' onclick="document.getElementById(\'notificationPanel\').style.display=\'none\';navigateTo(\'' + n.link + '\')"';
                        }
                        html += '>';
                        html += '<div class="notif-type">' + n.type + '</div>';
                        html += '<div class="notif-message">' + n.message + '</div>';
                        html += '<div class="notif-time">' + new Date(n.time).toLocaleString('ru-RU') + '</div>';
                        html += '</div>';
                        n.read = true;
                    });
                    
                    if (notifications.length > 30) {
                        html += '<p style="color:var(--text-secondary);text-align:center;font-size:0.8rem;padding:10px;">Показаны последние 30 уведомлений из ' + notifications.length + '</p>';
                    }
                }
                
                if (notifications.length > 0) {
                    html += '<div style="text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--notif-border);">';
                    html += '<button class="friend-action-btn" onclick="clearNotifications()" style="font-size:0.75rem;"><i class="fas fa-trash"></i> Очистить все</button>';
                    html += '</div>';
                }
                
                html += '</div>';
                panel.innerHTML = html;
                panel.style.display = 'block';
                panel.scrollTop = 0;
                
                updateNotificationBadge();
            } else {
                panel.style.display = 'none';
            }
        }

        function togglePlaylist() {
            const panel = document.getElementById('playlistPanel');
            if (!panel) return;
            
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                panel.style.animation = 'fadeInUp 0.3s ease-out';
            } else {
                panel.style.display = 'none';
            }
        }

        function switchTrack(index) {
            const bgMusic = document.getElementById('bgMusic');
            if (!bgMusic) return;
            
            currentTrackIndex = index;
            const track = PLAYLIST[index];
            
            bgMusic.querySelector('source').src = track.file;
            bgMusic.load();
            
            bgMusic.play().then(function() {
                setPlayingState(true);
                updatePlaylistActive();
                showToast('🎵 ' + track.title, 2000);
            }).catch(function() {
                setPlayingState(false);
            });
        }

        function nextTrack() {
            const nextIndex = (currentTrackIndex + 1) % PLAYLIST.length;
            switchTrack(nextIndex);
        }

        function prevTrack() {
            const prevIndex = (currentTrackIndex - 1 + PLAYLIST.length) % PLAYLIST.length;
            switchTrack(prevIndex);
        }

        function updatePlaylistActive() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach(function(item, index) {
                if (index === currentTrackIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function setPlayingState(playing) {
            isMusicPlaying = playing;
            const icon = document.getElementById('musicPlayIcon');
            if (icon) {
                icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
            }
        }

        function playMusic() {
            const bgMusic = document.getElementById('bgMusic');
            if (!bgMusic) return;
            
            bgMusic.volume = 0.5;
            bgMusic.play().then(function() {
                if (!musicStarted) musicStarted = true;
                setPlayingState(true);
            }).catch(function(err) {
                console.warn('Автовоспроизведение заблокировано браузером, ждём клик');
                setPlayingState(false);
            });
        }

        function pauseMusic() {
            const bgMusic = document.getElementById('bgMusic');
            if (!bgMusic) return;
            bgMusic.pause();
            setPlayingState(false);
        }

        function togglePlayback() {
            const bgMusic = document.getElementById('bgMusic');
            if (!bgMusic) return;
            
            if (!musicStarted) {
                playMusic();
                return;
            }
            
            if (bgMusic.paused) {
                playMusic();
            } else {
                pauseMusic();
            }
        }

        function seekAudio(value) {
            const bgMusic = document.getElementById('bgMusic');
            if (!bgMusic || !bgMusic.duration || isNaN(bgMusic.duration)) return;
            bgMusic.currentTime = (value / 100) * bgMusic.duration;
            updateTimeDisplay();
        }

        function updateTimeDisplay() {
            const bgMusic = document.getElementById('bgMusic');
            const timeDisplay = document.getElementById('timeDisplay');
            const seekBar = document.getElementById('seekBar');
            
            if (!bgMusic || !timeDisplay) return;
            
            if (!bgMusic.duration || isNaN(bgMusic.duration)) {
                timeDisplay.textContent = '00:00 / 00:00';
                return;
            }
            
            const current = bgMusic.currentTime;
            const total = bgMusic.duration;
            timeDisplay.textContent = `${formatTime(current)} / ${formatTime(total)}`;
            
            const percent = (current / total) * 100;
            if (seekBar && document.activeElement !== seekBar) {
                seekBar.value = percent;
            }
        }

        function updateVolumeUI() {
            const bgMusic = document.getElementById('bgMusic');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            
            if (!bgMusic) return;
            
            const vol = bgMusic.volume;
            if (volumeSlider && document.activeElement !== volumeSlider) {
                volumeSlider.value = vol;
            }
            
            if (volumeIcon) {
                if (vol === 0) {
                    volumeIcon.className = 'fas fa-volume-mute volume-icon';
                } else if (vol < 0.5) {
                    volumeIcon.className = 'fas fa-volume-down volume-icon';
                } else {
                    volumeIcon.className = 'fas fa-volume-up volume-icon';
                }
            }
        }

        (function initMusicPlayer() {
            const bgMusic = document.getElementById('bgMusic');
            const musicToggleBtn = document.getElementById('musicToggleBtn');
            const musicPrevBtn = document.getElementById('musicPrevBtn');
            const musicNextBtn = document.getElementById('musicNextBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const seekBar = document.getElementById('seekBar');
            
            if (bgMusic) {
                bgMusic.volume = 0.5;
                if (volumeSlider) volumeSlider.value = 0.5;
                
                bgMusic.addEventListener('loadedmetadata', function() {
                    updateTimeDisplay();
                    if (seekBar) seekBar.max = 100;
                });
                
                bgMusic.addEventListener('timeupdate', updateTimeDisplay);
                bgMusic.addEventListener('play', function() { setPlayingState(true); });
                bgMusic.addEventListener('pause', function() { setPlayingState(false); });
                bgMusic.addEventListener('volumechange', updateVolumeUI);
                bgMusic.addEventListener('ended', function() { nextTrack(); });
                
                bgMusic.addEventListener('error', function(e) {
                    console.warn('Audio error:', e);
                });
                
                window.addEventListener('load', function() {
                    updateVolumeUI();
                    updateTimeDisplay();
                    setTimeout(function() {
                        playMusic();
                    }, 800);
                });
                
                document.addEventListener('click', function autoPlayOnce() {
                    if (!musicStarted) {
                        playMusic();
                    }
                }, { once: true });
            }
            
            if (musicToggleBtn) {
                musicToggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    togglePlayback();
                });
            }
            
            if (musicPrevBtn) {
                musicPrevBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    prevTrack();
                });
            }
            
            if (musicNextBtn) {
                musicNextBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    nextTrack();
                });
            }
            
            if (volumeSlider) {
                volumeSlider.addEventListener('input', function(e) {
                    if (!bgMusic) return;
                    bgMusic.volume = parseFloat(e.target.value);
                    updateVolumeUI();
                });
                
                volumeSlider.addEventListener('change', function() {
                    if (bgMusic) {
                        showToast(`🔊 Громкость: ${Math.round(bgMusic.volume * 100)}%`, 1000);
                    }
                });
            }
            
            if (seekBar) {
                seekBar.addEventListener('input', function(e) {
                    if (!bgMusic || !bgMusic.duration) return;
                    seekAudio(parseFloat(e.target.value));
                });
                
                seekBar.addEventListener('change', function() {
                    if (bgMusic && bgMusic.duration) {
                        showToast(`⏩ Перемотка: ${formatTime(bgMusic.currentTime)}`, 1000);
                    }
                });
            }
        })();

        function createAnimePetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal-anime');
            
            const size = 16 + Math.random() * 14;
            const colorIntensity = 0.6 + Math.random() * 0.4;
            const colors = [
                `rgba(220, 220, 220, ${colorIntensity})`,
                `rgba(200, 200, 200, ${colorIntensity})`,
                `rgba(240, 240, 240, ${colorIntensity})`,
                `rgba(180, 180, 180, ${colorIntensity})`
            ];
            const bgColor = colors[Math.floor(Math.random() * colors.length)];
            
            petal.innerHTML = `<svg width="${size}" height="${size * 1.1}" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 3px rgba(200,200,200,0.5));"><path d="M20 2 C22 8, 30 12, 35 18 C38 22, 38 30, 34 34 C30 38, 24 40, 20 42 C16 40, 10 38, 6 34 C2 30, 2 22, 5 18 C10 12, 18 8, 20 2Z" fill="${bgColor}" stroke="rgba(180,180,180,0.7)" stroke-width="0.8"/><path d="M20 8 C22 14, 28 18, 32 22 C34 26, 34 30, 30 33 C26 36, 22 38, 20 39 C18 38, 14 36, 10 33 C6 30, 6 26, 8 22 C12 18, 18 14, 20 8Z" fill="rgba(255,255,255,0.3)"/><path d="M20 12 L20 35" stroke="rgba(200,200,200,0.5)" stroke-width="0.5"/><circle cx="20" cy="15" r="1.5" fill="rgba(220,220,220,0.8)"/></svg>`;
            
            petal.style.width = size + 'px';
            petal.style.height = (size * 1.15) + 'px';
            petal.style.left = Math.random() * 100 + '%';
            
            const duration = 5 + Math.random() * 7;
            petal.style.animation = `fallAnime ${duration}s linear forwards`;
            petal.style.animationDelay = Math.random() * 2 + 's';
            
            const startRotate = Math.random() * 360;
            petal.style.transform = `rotate(${startRotate}deg) scale(${0.7 + Math.random() * 0.6})`;
            petal.style.filter = 'drop-shadow(0 0 3px rgba(200, 200, 200, 0.7))';
            
            document.body.appendChild(petal);
            
            setTimeout(function() {
                if (petal && petal.parentNode) petal.remove();
            }, duration * 1000 + 500);
        }

        let petalInterval;
        function startPetals() {
            if (petalInterval) clearInterval(petalInterval);
            
            for (let i = 0; i < 22; i++) {
                setTimeout(function() { createAnimePetal(); }, i * 150);
            }
            
            petalInterval = setInterval(function() {
                const count = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    setTimeout(function() { createAnimePetal(); }, i * 100);
                }
            }, 600);
        }

        let toastTimeout = null;
        const toast = document.getElementById('toastMsg');
        function showToast(message, duration = 2500) {
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() {
                toast.classList.remove('show');
            }, duration);
        }

        function updateFooterDate() {
            const dateSpan = document.getElementById('currentDate');
            if (dateSpan) {
                const today = new Date();
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                dateSpan.textContent = today.toLocaleDateString('ru-RU', options);
            }

        function handleFileUpload(file) {
            if (!file.type.startsWith('image/')) {
                showToast('❌ Пожалуйста, выберите изображение', 3000);
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('❌ Файл слишком большой (макс. 5MB)', 3000);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                showAddImageModal(file, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function showLightbox(index) {
            getGalleryData().then(function(gallery) {
                currentLightboxIndex = index;
                const image = gallery[index];
                
                if (!image) return;
                
                const existingLightbox = document.getElementById('lightbox');
                if (existingLightbox) safeRemove('lightbox');
                
                const lightboxHTML = `
                    <div class="lightbox" id="lightbox">
                        <button class="lightbox-close" id="closeLightbox"><i class="fas fa-times"></i></button>
                        ${gallery.length > 1 ? `
                            <button class="lightbox-nav lightbox-prev" id="prevImage"><i class="fas fa-chevron-left"></i></button>
                            <button class="lightbox-nav lightbox-next" id="nextImage"><i class="fas fa-chevron-right"></i></button>
                        ` : ''}
                        <div class="lightbox-content">
                            <img src="${image.imageUrl}" class="lightbox-image" alt="${image.title}">
                            <div class="lightbox-info">
                                <h3>${image.title}</h3>
                                <p>${image.desc}</p>
                                <p style="font-size: 0.8rem; color: #888;">${image.author} | ${new Date(image.date).toLocaleDateString('ru-RU')} | Изображение ${index + 1} из ${gallery.length}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.insertAdjacentHTML('beforeend', lightboxHTML);
                
                const lightbox = document.getElementById('lightbox');
                if (lightbox) {
                    lightbox.addEventListener('click', function(e) {
                        if (e.target === this || e.target.id === 'closeLightbox' || e.target.closest('#closeLightbox')) {
                            safeRemove('lightbox');
                        }
                    });
                }
                
                if (gallery.length > 1) {
                    const prevBtn = document.getElementById('prevImage');
                    const nextBtn = document.getElementById('nextImage');
                    
                    if (prevBtn) {
                        prevBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            safeRemove('lightbox');
                            showLightbox((currentLightboxIndex - 1 + gallery.length) % gallery.length);
                        });
                    }
                    
                    if (nextBtn) {
                        nextBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            safeRemove('lightbox');
                            showLightbox((currentLightboxIndex + 1) % gallery.length);
                        });
                    }
                }
                
                const keyHandler = function(e) {
                    if (e.key === 'ArrowLeft') {
                        safeRemove('lightbox');
                        document.removeEventListener('keydown', keyHandler);
                        showLightbox((currentLightboxIndex - 1 + gallery.length) % gallery.length);
                    } else if (e.key === 'ArrowRight') {
                        safeRemove('lightbox');
                        document.removeEventListener('keydown', keyHandler);
                        showLightbox((currentLightboxIndex + 1) % gallery.length);
                    } else if (e.key === 'Escape') {
                        safeRemove('lightbox');
                        document.removeEventListener('keydown', keyHandler);
                    }
                };
                document.addEventListener('keydown', keyHandler);
            });
        }

            document.querySelectorAll('.gallery-item').forEach(function(item) {

            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');
            
            if (uploadZone && fileInput) {
                uploadZone.addEventListener('click', function() { fileInput.click(); });
                
                uploadZone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    uploadZone.style.borderColor = '#ffffff';
                    uploadZone.style.background = 'rgba(255, 255, 255, 0.15)';
                });

                uploadZone.addEventListener('dragleave', function() {
                    uploadZone.style.borderColor = '#888888';
                    uploadZone.style.background = 'rgba(255, 255, 255, 0.05)';
                });

                uploadZone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    uploadZone.style.borderColor = '#888888';
                    uploadZone.style.background = 'rgba(255, 255, 255, 0.05)';
                    const file = e.dataTransfer.files[0];
                    if (file) handleFileUpload(file);
                });

                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) handleFileUpload(file);
                    fileInput.value = '';
                });
            }

            const backBtn = document.getElementById('backToMainFromGallery');
            if (backBtn) backBtn.addEventListener('click', function() { navigateTo('main'); });
        }

        function canChangeNickname() {
            if (!currentUser) return false;
            if (!currentUser.lastNicknameChange) return true;
            
            const lastChange = new Date(currentUser.lastNicknameChange);
            const hoursSinceChange = (Date.now() - lastChange.getTime()) / (1000 * 60 * 60);
            
            return hoursSinceChange >= NICKNAME_CHANGE_LIMIT_HOURS;
        }

        function getTimeUntilNicknameChange() {
            if (!currentUser || !currentUser.lastNicknameChange) return null;
            
            const lastChange = new Date(currentUser.lastNicknameChange);
            const nextChangeTime = lastChange.getTime() + (NICKNAME_CHANGE_LIMIT_HOURS * 60 * 60 * 1000);
            
            return {
                hoursLeft: Math.ceil((nextChangeTime - Date.now()) / (1000 * 60 * 60)),
                nextChangeDate: new Date(nextChangeTime).toLocaleString('ru-RU')
            };
        }

                        <div class="verification-icon">

                        </div>
                        
                        <div class="verification-info">

                            <strong>${email}</strong>
                        </div>

                            <input type="text" class="code-input" id="vc1" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="code-input" id="vc2" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="code-input" id="vc3" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">

                        </div>
                        
                        <div style="text-align: center; margin-top: 15px;">
                            <p style="color: #888; font-size: 0.9rem;">
                                Не пришёл код? 
                                <span class="resend-link" id="resendCode">Отправить повторно</span>

                            <p class="verification-timer" id="verificationTimer"></p>
                        </div>
                        
                        <div class="modal-buttons" style="margin-top: 25px;">
                            <button class="modal-btn primary" id="verifyCodeBtn">
                                <i class="fas fa-check-circle"></i> Подтвердить
                            </button>
                            <button class="modal-btn secondary" id="cancelVerify">
                                <i class="fas fa-times-circle"></i> Отмена
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            const inputs = document.querySelectorAll('#verifyModal .code-input');
            
            let timeLeft = 600;
            let timerInterval = null;
            const timerDisplay = document.getElementById('verificationTimer');
            
            function updateTimer() {
                if (!document.getElementById('verifyModal')) {
                    if (timerInterval) clearInterval(timerInterval);
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                if (timerDisplay) {
                    timerDisplay.textContent = `Код действителен: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
                
                if (timeLeft <= 60 && timerDisplay) {
                    timerDisplay.style.color = '#f44336';
                }
                
                if (timeLeft <= 0) {
                    if (timerInterval) clearInterval(timerInterval);
                    if (timerDisplay) timerDisplay.textContent = 'Время кода истекло';
                    inputs.forEach(function(inp) {
                        inp.disabled = true;
                        inp.classList.add('error');
                    });
                }
                
                timeLeft--;
            }
            
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();
            
            inputs.forEach(function(input, index) {
                input.addEventListener('input', function(e) {
                    const value = e.target.value;
                    
                    if (!/^\d$/.test(value)) {
                        e.target.value = '';
                        return;
                    }
                    
                    if (value) {
                        input.classList.add('filled');
                    } else {
                        input.classList.remove('filled');
                    }
                    
                    if (value && index < 5) {
                        inputs[index + 1].focus();
                    }
                    
                    checkAllFilled();
                });
                
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].classList.remove('filled');
                    }
                    
                    if (e.key === 'v' && e.ctrlKey) {
                        e.preventDefault();
                        navigator.clipboard.readText().then(function(text) {
                            const code = text.replace(/\D/g, '').slice(0, 6);
                            if (code.length === 6) {
                                code.split('').forEach(function(digit, i) {
                                    if (inputs[i]) {
                                        inputs[i].value = digit;
                                        inputs[i].classList.add('filled');
                                    }
                                });
                                checkAllFilled();
                            }
                        });
                    }
                });
            });
            
            function checkAllFilled() {
                const allFilled = Array.from(inputs).every(function(inp) {
                    return inp.value !== '';
                });
                
                const verifyBtn = document.getElementById('verifyCodeBtn');
                if (verifyBtn) {
                    if (allFilled) {
                        verifyBtn.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32)';
                        verifyBtn.style.color = '#ffffff';
                        verifyBtn.style.borderColor = '#4CAF50';
                    } else {
                        verifyBtn.style.background = '#ffffff';
                        verifyBtn.style.color = '#000000';
                        verifyBtn.style.borderColor = '#ffffff';
                    }
                }
            }
            
            const verifyModal = document.getElementById('verifyModal');
            if (verifyModal) {
                verifyModal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        if (timerInterval) clearInterval(timerInterval);
                        safeRemove('verifyModal');
                    }
                });
            }
            
            const cancelBtn = document.getElementById('cancelVerify');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    if (timerInterval) clearInterval(timerInterval);
                    safeRemove('verifyModal');
                    showToast('Регистрация отменена', 2000);
                });
            }
            
            const resendLink = document.getElementById('resendCode');
            if (resendLink) {
                resendLink.addEventListener('click', async function() {
                    const newCode = await sendVerificationCodeToUser(email, username);
                    if (newCode) {
                        correctCode = newCode;
                        inputs.forEach(function(inp) {
                            inp.value = '';
                            inp.classList.remove('filled', 'error');
                            inp.disabled = false;
                        });
                        if (inputs[0]) inputs[0].focus();
                        
                        timeLeft = 600;
                        if (timerDisplay) timerDisplay.style.color = '#888';
                        showToast('✅ Новый код отправлен!', 3000);
                    }
                });
            }
            
            const verifyBtn = document.getElementById('verifyCodeBtn');
            if (verifyBtn) {
                verifyBtn.addEventListener('click', async function() {
                    let enteredCode = '';
                    inputs.forEach(function(inp) { enteredCode += inp.value; });
                    
                    if (enteredCode.length !== 6) {
                        showToast('❌ Введите все 6 цифр кода', 3000);
                        inputs.forEach(function(inp) {
                            if (!inp.value) inp.classList.add('error');
                        });
                        return;
                    }
                    
                    try {
                        const result = await api.verifyCode(email, enteredCode);
                        if (result.valid) {
                            if (timerInterval) clearInterval(timerInterval);
                            safeRemove('verifyModal');
                            
                            // Регистрируем на сервере
                            try {
                                await api.register(email, username, password);
                            } catch(regErr) {
                                console.warn('Регистрация на сервере:', regErr.message);
                            }
                            
                            // ===== АВТОМАТИЧЕСКИЙ ВХОД ПОСЛЕ РЕГИСТРАЦИИ =====
                            try {
                                const loginResult = await api.login(email, password);
                                if (loginResult.token) {
                                    await api.getProfile();
                                    console.log('✅ Автовход после регистрации успешен!');
                                }
                            } catch(loginErr) {
                                console.warn('Автовход не удался:', loginErr.message);
                                // Запасной вариант
                                saveUserData({ email: email, username: username, loginTime: new Date().toISOString() });
                            }

                            showToast('✅ Регистрация успешно завершена! Добро пожаловать!', 3000);
                            navigateTo('main');

                        }
                    } catch (err) {
                        showToast('❌ Ошибка проверки кода', 3000);
                    }
                });
            }
            
            setTimeout(function() { 
                if (inputs[0] && document.getElementById('verifyModal')) inputs[0].focus(); 
            }, 500);
