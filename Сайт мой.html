<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Куратор, вам нужно отдохнуть от шараги</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('my-background.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes galleryFadeIn {
            from { opacity: 0; transform: scale(0.8) rotateY(10deg); }
            to { opacity: 1; transform: scale(1) rotateY(0deg); }
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.8) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes codePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes lightboxFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .card { animation: fadeInUp 0.6s ease-out; }
        .creator-card { animation: fadeInScale 0.5s ease-out; }
        .creator-card:nth-child(1) { animation-delay: 0.1s; }
        .creator-card:nth-child(2) { animation-delay: 0.2s; }
        .creator-card:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item { animation: galleryFadeIn 0.6s ease-out; }
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }
        .gallery-item:nth-child(7) { animation-delay: 0.7s; }
        .gallery-item:nth-child(8) { animation-delay: 0.8s; }
        .choice-btn { animation: slideInLeft 0.5s ease-out; }
        .choice-btn.blue { animation: slideInRight 0.5s ease-out; }

        .petal-anime {
            position: fixed;
            top: -30px;
            pointer-events: none;
            z-index: 9999;
            will-change: transform, opacity;
            filter: drop-shadow(0 0 3px rgba(200, 200, 200, 0.6));
        }

        @keyframes fallAnime {
            0% { transform: translateY(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg) translateZ(0); opacity: 0.9; }
            20% { transform: translateY(20vh) rotateX(45deg) rotateY(30deg) rotateZ(60deg) translateZ(10px); }
            40% { transform: translateY(40vh) rotateX(90deg) rotateY(60deg) rotateZ(120deg) translateZ(5px); }
            60% { transform: translateY(60vh) rotateX(135deg) rotateY(90deg) rotateZ(180deg) translateZ(-5px); }
            80% { transform: translateY(80vh) rotateX(180deg) rotateY(120deg) rotateZ(240deg) translateZ(-10px); opacity: 0.5; }
            100% { transform: translateY(100vh) rotateX(225deg) rotateY(150deg) rotateZ(300deg) translateZ(-15px); opacity: 0; }
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #888888;
            z-index: 10;
        }

        .logo-left {
            position: absolute;
            left: 40px;
            color: #cccccc;
            font-weight: bold;
            font-size: 1.6rem;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-left:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-color: #ffffff;
        }

        .logo-left i {
            margin-right: 8px;
            color: #999999;
        }

        .nav-links {
            position: absolute;
            right: 40px;
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: #cccccc;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-color: #ffffff;
        }

        .nav-link i {
            margin-right: 5px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            background: linear-gradient(90deg, #ffffff, #888888, #cccccc, #666666, #ffffff);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 6s linear infinite;
            margin: 0;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.3s ease-out;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #888888;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.4s ease-out;
        }

        .modal-content h2 {
            color: #ffffff;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.8rem;
        }

        .modal-content h2 i {
            color: #888888;
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #cccccc;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #666666;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .code-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 50px !important;
            height: 60px;
            text-align: center;
            font-size: 1.5rem !important;
            font-weight: bold;
            animation: codePulse 2s infinite;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #888888;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .modal-btn.primary {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .modal-btn.primary:hover {
            background: #cccccc;
            transform: translateY(-2px);
        }

        .modal-btn.secondary {
            background: transparent;
            color: #cccccc;
        }

        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
            color: #888888;
        }

        .forgot-password span {
            color: #ffffff;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .forgot-password span:hover {
            color: #cccccc;
        }

        .music-player-panel {
            position: fixed;
            bottom: 90px;
            left: 25px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .music-control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid #666666;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6);
        }

        .music-control-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #888888;
            color: #cccccc;
            font-size: 1.2rem;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .music-control-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.08);
            border-color: #ffffff;
        }

        .volume-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .volume-icon {
            color: #cccccc;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 5px;
            background: linear-gradient(to right, #666666, #cccccc);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            border: 2px solid #888888;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            background: #dddddd;
            transform: scale(1.15);
        }

        .seek-bar-container {
            width: 160px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .seek-bar {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .seek-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #cccccc;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px #888888;
            transition: 0.2s;
        }

        .seek-bar::-webkit-slider-thumb:hover {
            background: #ffffff;
            transform: scale(1.2);
        }

        .time-display {
            color: #cccccc;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 65px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        button, .choice-btn, .single-action-btn, .back-btn, .nav-btn, .footer-btn, .nav-link {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
            cursor: pointer;
        }

        .choice-btn:hover, .single-action-btn:hover, .back-btn:hover, .footer-btn:hover, .nav-link:hover {
            transform: translateY(-5px) scale(1.02);
            filter: brightness(1.1);
        }

        .choice-btn:active, .single-action-btn:active, .back-btn:active {
            transform: translateY(3px) scale(0.98) !important;
        }

        .card {
            background: rgba(30, 30, 30, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 24px;
            width: 100%;
            z-index: 5;
            position: relative;
        }

        .card h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .card p {
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .choice-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 20px;
        }

        .choice-btn {
            background: linear-gradient(105deg, #4a4a4a, #2a2a2a);
            border: 2px solid #666666;
            padding: 18px 42px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            color: #e0e0e0;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 7px 0 #1a1a1a;
            font-family: inherit;
        }

        .choice-btn.blue {
            background: linear-gradient(105deg, #555555, #333333);
            color: #ffffff;
            box-shadow: 0 7px 0 #1a1a1a;
            border: 2px solid #888888;
        }

        .single-action-btn {
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.6rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            font-family: inherit;
            margin: 20px 0;
            border: 2px solid #888888;
        }

        .hell-btn {
            background: linear-gradient(105deg, #333333, #1a1a1a);
            color: #ffffff;
            box-shadow: 0 8px 0 #0a0a0a;
        }

        .heaven-btn {
            background: linear-gradient(105deg, #555555, #333333);
            color: #ffffff;
            box-shadow: 0 8px 0 #1a1a1a;
        }

        .back-btn {
            background: #2a2a2a;
            color: #cccccc;
            border: 1px solid #666666;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
        }

        .back-btn:hover {
            background: #3a3a3a;
            color: #ffffff;
        }

        .gallery-cover {
            position: relative;
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid #444444;
        }

        .gallery-cover:hover {
            transform: scale(1.02);
            border-color: #ffffff;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        .gallery-cover-image {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #333333);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: #888888;
            object-fit: cover;
        }

        .gallery-cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
        }

        .gallery-cover-overlay h2 {
            color: #ffffff;
            margin-bottom: 5px;
        }

        .gallery-cover-overlay p {
            color: #cccccc;
            font-size: 0.9rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .gallery-item {
            background: #252525;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #444444;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
            border-color: #888888;
        }

        .gallery-image-wrapper {
            width: 100%;
            height: 250px;
            position: relative;
            overflow: hidden;
        }

        .gallery-image-blurred {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.4);
            transition: filter 0.3s;
            transform: scale(1.1);
        }

        .gallery-item:hover .gallery-image-blurred {
            filter: blur(15px) brightness(0.5);
        }

        .gallery-image-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.6);
            z-index: 2;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .gallery-item:hover .gallery-image-icon {
            transform: translate(-50%, -50%) scale(1.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            transition: 0.3s;
        }

        .gallery-item:hover .gallery-overlay {
            background: rgba(0, 0, 0, 0.1);
        }

        .click-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .gallery-item:hover .click-hint {
            background: rgba(255, 255, 255, 0.3);
        }

        .gallery-info {
            padding: 20px;
        }

        .gallery-info h3 {
            color: #e0e0e0;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .gallery-info p {
            color: #999999;
            font-size: 0.9rem;
            margin: 0;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 1);
            transform: scale(1.1);
        }

        .upload-zone {
            border: 2px dashed #888888;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-zone:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .upload-zone i {
            font-size: 3rem;
            color: #888888;
            margin-bottom: 15px;
        }

        .upload-zone p {
            color: #cccccc;
            font-size: 1.1rem;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lightboxFade 0.3s ease-out;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
            z-index: 20001;
        }

        .lightbox-close:hover {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(1.1);
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .lightbox-info {
            color: #cccccc;
            text-align: center;
            margin-top: 20px;
        }

        .lightbox-info h3 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .footer-bar {
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(8px);
            padding: 18px 40px;
            border-top: 2px solid #888888;
            margin-top: auto;

    <script>
        const EMAILJS_CONFIG = {
            publicKey: '7FioK7lfQrKW6Rlud',
            serviceID: 'service_za8k5p6',
            template1ID: 'template_asajakk',
            template2ID: 'template_apyub0q'
        };

        (function() {
            emailjs.init(EMAILJS_CONFIG.publicKey);
        })();

        function sendEmail(templateID, templateParams) {
            return emailjs.send(EMAILJS_CONFIG.serviceID, templateID, templateParams)
                .then(function(response) {
                    console.log('✅ Email отправлен!', response.status);
                    return true;
                })
                .catch(function(error) {
                    console.error('❌ Ошибка отправки:', error);
                    return false;
                });
        }

        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        (function() {
            const bgMusic = document.getElementById('bgMusic');
            const musicToggleBtn = document.getElementById('musicToggleBtn');
            const musicPlayIcon = document.getElementById('musicPlayIcon');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            const seekBar = document.getElementById('seekBar');
            const timeDisplay = document.getElementById('timeDisplay');
            let isMusicPlaying = false;
            let musicStarted = false;
            let userInteracted = false;

            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function updateTimeDisplay() {
                if (!bgMusic.duration || isNaN(bgMusic.duration)) {
                    timeDisplay.textContent = '00:00 / 00:00';
                    return;
                }
                const current = bgMusic.currentTime;
                const total = bgMusic.duration;
                timeDisplay.textContent = `${formatTime(current)} / ${formatTime(total)}`;
                const percent = (current / total) * 100;
                if (seekBar && document.activeElement !== seekBar) {
                    seekBar.value = percent;
                }
            }

            function updateVolumeUI() {
                const vol = bgMusic.volume;
                if (volumeSlider && document.activeElement !== volumeSlider) {
                    volumeSlider.value = vol;
                }
                if (volumeIcon) {
                    if (vol === 0) {
                        volumeIcon.className = 'fas fa-volume-mute volume-icon';
                    } else if (vol < 0.5) {
                        volumeIcon.className = 'fas fa-volume-down volume-icon';
                    } else {
                        volumeIcon.className = 'fas fa-volume-up volume-icon';
                    }
                }
            }

            function setPlayingState(playing) {
                isMusicPlaying = playing;
                if (musicPlayIcon) {
                    musicPlayIcon.className = playing ? 'fas fa-pause' : 'fas fa-play';
                }
                musicToggleBtn.setAttribute('title', playing ? 'Пауза' : 'Воспроизвести');
            }

            function playMusic() {
                if (!bgMusic) return;
                bgMusic.play().then(function() {
                    if (!musicStarted) musicStarted = true;
                    setPlayingState(true);
                }).catch(function(err) {
                    console.warn('Play error:', err);
                    setPlayingState(false);
                });
            }

            function pauseMusic() {
                if (!bgMusic) return;
                bgMusic.pause();
                setPlayingState(false);
            }

            function togglePlayback() {
                if (!bgMusic) return;
                if (!musicStarted) {
                    playMusic();
                    return;
                }
                if (bgMusic.paused) {
                    playMusic();
                } else {
                    pauseMusic();
                }
            }

            function seekAudio(value) {
                if (!bgMusic || !bgMusic.duration || isNaN(bgMusic.duration)) return;
                bgMusic.currentTime = (value / 100) * bgMusic.duration;
                updateTimeDisplay();
            }

            if (bgMusic) {
                bgMusic.volume = 0.7;
                if (volumeSlider) volumeSlider.value = 0.7;
                bgMusic.addEventListener('loadedmetadata', function() {
                    updateTimeDisplay();
                    if (seekBar) seekBar.max = 100;
                });
                bgMusic.addEventListener('timeupdate', updateTimeDisplay);
                bgMusic.addEventListener('play', function() { setPlayingState(true); });
                bgMusic.addEventListener('pause', function() { setPlayingState(false); });
                bgMusic.addEventListener('volumechange', updateVolumeUI);
                bgMusic.addEventListener('ended', function() { setPlayingState(false); });
                bgMusic.addEventListener('error', function(e) {
                    console.warn('Audio error:', e);
                    showToast('⚠️ Аудиофайл не найден', 2000);
                });
            }

            if (musicToggleBtn) {
                musicToggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    togglePlayback();
                });
            }

            if (volumeSlider) {
                volumeSlider.addEventListener('input', function(e) {
                    if (!bgMusic) return;
                    bgMusic.volume = parseFloat(e.target.value);
                    updateVolumeUI();
                });
                volumeSlider.addEventListener('change', function() {
                    showToast(`🔊 Громкость: ${Math.round(bgMusic.volume * 100)}%`, 1000);
                });
            }

            if (seekBar) {
                seekBar.addEventListener('input', function(e) {
                    if (!bgMusic || !bgMusic.duration) return;
                    seekAudio(parseFloat(e.target.value));
                });
                seekBar.addEventListener('change', function() {
                    if (bgMusic && bgMusic.duration) {
                        showToast(`⏩ Перемотка: ${formatTime(bgMusic.currentTime)}`, 1000);
                    }
                });
            }

            function tryAutoStartOnFirstInteraction() {
                if (userInteracted || musicStarted) return;
                userInteracted = true;
                if (bgMusic && bgMusic.paused && !musicStarted) playMusic();
                document.removeEventListener('click', tryAutoStartOnFirstInteraction);
                document.removeEventListener('touchstart', tryAutoStartOnFirstInteraction);
                document.removeEventListener('keydown', tryAutoStartOnFirstInteraction);
            }

            document.addEventListener('click', tryAutoStartOnFirstInteraction);
            document.addEventListener('touchstart', tryAutoStartOnFirstInteraction);
            document.addEventListener('keydown', tryAutoStartOnFirstInteraction);

            window.addEventListener('load', function() {
                updateVolumeUI();
                updateTimeDisplay();
                setTimeout(function() {
                    if (!musicStarted && bgMusic) {
                        bgMusic.play().then(function() {
                            musicStarted = true;
                            setPlayingState(true);
                        }).catch(function() {});
                    }
                }, 600);
            });
        })();

        function createAnimePetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal-anime');
            const size = 16 + Math.random() * 14;
            const colorIntensity = 0.6 + Math.random() * 0.4;
            const colors = [

                `rgba(240, 240, 240, ${colorIntensity})`,

            const bgColor = colors[Math.floor(Math.random() * colors.length)];
            petal.innerHTML = `<svg width="${size}" height="${size * 1.1}" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 3px rgba(200,200,200,0.5));"><path d="M20 2 C22 8, 30 12, 35 18 C38 22, 38 30, 34 34 C30 38, 24 40, 20 42 C16 40, 10 38, 6 34 C2 30, 2 22, 5 18 C10 12, 18 8, 20 2Z" fill="${bgColor}" stroke="rgba(180,180,180,0.7)" stroke-width="0.8"/><path d="M20 8 C22 14, 28 18, 32 22 C34 26, 34 30, 30 33 C26 36, 22 38, 20 39 C18 38, 14 36, 10 33 C6 30, 6 26, 8 22 C12 18, 18 14, 20 8Z" fill="rgba(255,255,255,0.3)"/><path d="M20 12 L20 35" stroke="rgba(200,200,200,0.5)" stroke-width="0.5"/><circle cx="20" cy="15" r="1.5" fill="rgba(220,220,220,0.8)"/></svg>`;
            petal.style.width = size + 'px';
            petal.style.height = (size * 1.15) + 'px';
            petal.style.left = Math.random() * 100 + '%';
            const duration = 4 + Math.random() * 6;
            petal.style.animation = `fallAnime ${duration}s linear forwards`;
            petal.style.animationDelay = Math.random() * 1.5 + 's';
            const startRotate = Math.random() * 360;
            petal.style.transform = `rotate(${startRotate}deg) scale(${0.7 + Math.random() * 0.6})`;
            petal.style.filter = `drop-shadow(0 0 3px rgba(200, 200, 200, 0.7))`;
            document.body.appendChild(petal);
            setTimeout(function() {
                if (petal && petal.remove) petal.remove();
            }, duration * 1000 + 500);
        }

        let petalInterval;
        function startPetals() {
            if (petalInterval) clearInterval(petalInterval);
            for (let i = 0; i < 22; i++) {
                setTimeout(function() { createAnimePetal(); }, i * 120);
            }
            petalInterval = setInterval(function() {
                const count = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    setTimeout(function() { createAnimePetal(); }, i * 80);
                }
            }, 500);
        }

        let toastTimeout = null;
        const toast = document.getElementById('toastMsg');
        function showToast(message, duration = 2500) {
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() {
                toast.classList.remove('show');
            }, duration);
        }

        const GALLERY_IMAGES = [
            { id: 1, title: 'Roronoa Zoro', desc: 'Тот, что владеет тремя мечами..', imageUrl: 'gallery/Roronoa-Zoro.jfif', icon: 'fa-crown', isDefault: true, author: 'Magic Pedic Team', date: '2026-05-21' },
            { id: 2, title: 'DIO', desc: 'Он лишь хотел уничтожить семейное древо Джостаров. Но ничего не вышло..', imageUrl: 'gallery/DIO-Brando.jfif', icon: 'fa-skull', isDefault: true, author: 'Magic Pedic Team', date: '2026-05-21' },

            { id: 4, title: 'Supra. Yolooo', desc: 'ITS A SUPRA!!', imageUrl: 'gallery/Supra.jfif', icon: 'fa-fire', isDefault: true, author: 'Magic Pedic Team', date: '2026-05-21' },
            { id: 5, title: 'Крузак Двухсотый', desc: 'Черная легенда улиц. Его все боялись.', imageUrl: 'gallery/Crusak.jfif', icon: 'fa-ghost', isDefault: true, author: 'Magic Pedic Team', date: '2026-05-21' },

        function getGalleryData() {
            const saved = localStorage.getItem('magicPedicGallery');
            return saved ? JSON.parse(saved) : GALLERY_IMAGES;
        }

        function saveGalleryData(data) {
            localStorage.setItem('magicPedicGallery', JSON.stringify(data));
        }

        function addImageToGallery(imageData) {
            const gallery = getGalleryData();
            const newImage = {
                id: Date.now(),
                icon: null,
                title: imageData.title || 'Без названия',
                desc: imageData.desc || '',
                author: currentUser ? currentUser.username : 'Гость',
                date: new Date().toISOString(),
                isDefault: false,
                imageUrl: imageData.imageUrl
            };
            gallery.unshift(newImage);
            saveGalleryData(gallery);
            return newImage;
        }

        function deleteImageFromGallery(id) {
            let gallery = getGalleryData();
            gallery = gallery.filter(function(item) { return item.id !== id; });
            saveGalleryData(gallery);
        }

        function handleFileUpload(file) {
            if (!file.type.startsWith('image/')) {
                showToast('❌ Пожалуйста, выберите изображение', 3000);
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('❌ Файл слишком большой (макс. 5MB)', 3000);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const title = prompt('Название изображения:', file.name.replace(/\.[^/.]+$/, ""));
                if (title === null) return;
                const desc = prompt('Описание (необязательно):', '');
                if (desc === null) return;
                addImageToGallery({
                    title: title || 'Без названия',
                    desc: desc || '',
                    imageUrl: e.target.result
                });
                showToast('✅ Изображение добавлено!', 2000);
                renderGalleryPageContent();
            };
            reader.readAsDataURL(file);
        }

        let currentLightboxIndex = 0;

        function showLightbox(index) {
            const gallery = getGalleryData();
            currentLightboxIndex = index;
            const image = gallery[index];
            const existingLightbox = document.getElementById('lightbox');
            if (existingLightbox) existingLightbox.remove();
            
            const lightboxHTML = `
                <div class="lightbox" id="lightbox">
                    <button class="lightbox-close" id="closeLightbox"><i class="fas fa-times"></i></button>
                    ${gallery.length > 1 ? `
                        <button class="lightbox-nav lightbox-prev" id="prevImage"><i class="fas fa-chevron-left"></i></button>
                        <button class="lightbox-nav lightbox-next" id="nextImage"><i class="fas fa-chevron-right"></i></button>
                    ` : ''}
                    <div class="lightbox-content">
                        <img src="${image.imageUrl}" class="lightbox-image" alt="${image.title}">
                        <div class="lightbox-info">
                            <h3>${image.title}</h3>
                            <p>${image.desc}</p>
                            <p style="font-size: 0.8rem; color: #888;">${image.author} | ${new Date(image.date).toLocaleDateString('ru-RU')} | Изображение ${index + 1} из ${gallery.length}</p>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', lightboxHTML);
            
            document.getElementById('lightbox').addEventListener('click', function(e) {
                if (e.target === this || e.target.id === 'closeLightbox') this.remove();
            });
            
            if (gallery.length > 1) {
                document.getElementById('prevImage').addEventListener('click', function(e) {
                    e.stopPropagation();
                    document.getElementById('lightbox').remove();
                    showLightbox((currentLightboxIndex - 1 + gallery.length) % gallery.length);
                });
                document.getElementById('nextImage').addEventListener('click', function(e) {
                    e.stopPropagation();
                    document.getElementById('lightbox').remove();
                    showLightbox((currentLightboxIndex + 1) % gallery.length);
                });
            }
            
            const keyHandler = function(e) {
                if (e.key === 'ArrowLeft') {
                    document.getElementById('lightbox')?.remove();
                    document.removeEventListener('keydown', keyHandler);
                    showLightbox((currentLightboxIndex - 1 + gallery.length) % gallery.length);
                } else if (e.key === 'ArrowRight') {
                    document.getElementById('lightbox')?.remove();
                    document.removeEventListener('keydown', keyHandler);
                    showLightbox((currentLightboxIndex + 1) % gallery.length);
                } else if (e.key === 'Escape') {
                    document.getElementById('lightbox')?.remove();
                    document.removeEventListener('keydown', keyHandler);
                }
            };
            document.addEventListener('keydown', keyHandler);
        }

                    : `<div class="gallery-image-wrapper"><div class="gallery-image-blurred" style="background:linear-gradient(135deg, #333333, #1a1a1a);"></div><div class="gallery-overlay"></div><div class="gallery-image-icon"><i class="fas ${item.icon}"></i></div><div class="click-hint"><i class="fas fa-search-plus"></i> Нажмите для просмотра</div></div>`;
                
                const deleteButton = (!item.isDefault && currentUser) 
                    ? `<button class="delete-btn" data-id="${item.id}" title="Удалить"><i class="fas fa-trash"></i></button>` 
                    : '';
                
                html += `
                    <div class="gallery-item" data-index="${index}" style="animation-delay: ${index * 0.05}s">
                        ${deleteButton}
                        ${imageContent}
                        <div class="gallery-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                            <p style="font-size: 0.7rem; color: #666; margin-top: 5px;">
                                <i class="fas fa-user"></i> ${item.author} | 
                                <i class="fas fa-calendar"></i> ${new Date(item.date).toLocaleDateString('ru-RU')}
                            </p>

                    </div>

            });
            
            html += `</div>`;

                    </div>
                `;

        async function sendVerificationCodeToUser(email, username) {
            const code = generateVerificationCode();
            
            const codeData = {
                email: email,
                code: code,
                expiresAt: Date.now() + 600000
            };
            localStorage.setItem('pendingVerification', JSON.stringify(codeData));
            
            showToast('📧 Отправка кода подтверждения...', 2000);
            
            const sent = await sendEmail(EMAILJS_CONFIG.template2ID, {
                to_email: email,
                username: username,
                code: code,
                time: new Date().toLocaleString('ru-RU')
            });
            
            if (sent) {
                showToast('✅ Код отправлен на вашу почту!', 3000);
                return code;
            } else {
                showToast('⚠️ Ошибка отправки. Попробуйте позже.', 3000);
                return null;
            }
        }

        function verifyCode(email, enteredCode) {
            const saved = JSON.parse(localStorage.getItem('pendingVerification'));
            
            if (!saved) {
                showToast('❌ Код подтверждения не найден или истек', 3000);
                return false;
            }
            
            if (saved.email !== email) {
                showToast('❌ Неверный email для подтверждения', 3000);
                return false;
            }
            
            if (Date.now() > saved.expiresAt) {
                localStorage.removeItem('pendingVerification');
                showToast('❌ Срок действия кода истек. Запросите новый код', 3000);
                return false;
            }
            
            if (saved.code !== enteredCode) {
                showToast('❌ Неверный код подтверждения', 3000);
                return false;
            }
            
            localStorage.removeItem('pendingVerification');
            return true;
        }

                            <i class="fas fa-dove"></i> Баунти!
                        </button>
                    </div>
                    <div style="margin-top: 35px; font-size: 0.85rem; color: #888888;">
                        <i class="fas fa-arrow-up"></i> Жми куда-нибудь, чтоб узнать свою судьбу.
                    </div>
                </div>
            `;
        }

        function renderHellPage() {
            return `
                <div class="card">
                    <h2><i class="fas fa-skull"></i> Адовый угар</h2>
                    <p>
                        Ты выбрал быть СИТХОМ. Теперь тебе придется дрочить весь ноябрь. Десять раз в день.<br>
                        Жми на эту сочную кнопочку и подрочи с кайфом)
                    </p>
                    <div>
                        <button class="single-action-btn hell-btn" id="hellSingleBtn">
                            <i class="fas fa-fire"></i> Получить удовольствие.
                        </button>
                    </div>
                    <div style="margin-top: 30px;">
                        <button class="back-btn" id="backToMainFromHell">← Вернуться на главную</button>
                    </div>
                </div>
            `;
        }

        function renderHeavenPage() {
            return `
                <div class="card">
                    <h2><i class="fas fa-heart"></i> Made in Heaven</h2>
                    <p>
                        Ты решил вознестись к богу, как ДИО в своё время не смог.<br>
                        Жми скорее кнопочку и получи годноту.
                    </p>
                    <div>
                        <button class="single-action-btn heaven-btn" id="heavenSingleBtn">
                            <i class="fas fa-dove"></i> Бог ждет тебя.
                        </button>
                    </div>
                    <div style="margin-top: 30px;">
                        <button class="back-btn" id="backToMainFromHeaven">← Вернуться на главную</button>
                    </div>
                </div>
            `;
        }

        function renderAboutPage() {
            return `
                <div class="card">
                    <h2><i class="fas fa-users"></i> О создателях</h2>
                    <p>Этот сайт сделали три умных мальчика. Максим легенда.</p>
                    <div class="creators-grid">
                        <div class="creator-card">
                            <i class="fas fa-user-astronaut"></i>
                            <h3>Максимка</h3>
                            <p>Главный пусибой, харизматичный, все девочки с него текут.</p>
                        </div>
                        <div class="creator-card">
                            <i class="fas fa-user-ninja"></i>
                            <h3>Костик</h3>
                            <p>Просто Костик. Ну там, давайте каточку в дотку?</p>
                        </div>
                        <div class="creator-card">
                            <i class="fas fa-user-graduate"></i>
                            <h3>Ванечка</h3>
                            <p>Мрачный тип. Любит паркур.</p>
                        </div>
                    </div>
                    <div style="margin-top: 35px;">
                        <p><i class="fas fa-envelope"></i> По вопросам сотрудничества: gorevkr2007@gmail.com</p>
                        <p><i class="fab fa-telegram"></i> Наш Telegram: @logovo_cekretika</p>
                        <button class="back-btn" id="backToMainFromAbout">← Вернуться на главную</button>
                    </div>
                </div>
            `;
        }

        function renderGalleryPage() {
            return `
                <div class="card">
                    <h2><i class="fas fa-images"></i> Галерея Magic Pedic</h2>
                    <p>Коллекция эксклюзивных артов от нашей команды. Наслаждайтесь просмотром!</p>
                    <div id="galleryContent"></div>
                </div>
            `;
        }

        let currentPage = 'main';
        const appContainer = document.getElementById('appContainer');

        function attachEventListeners() {
            const goToHell = document.getElementById('goToHellBtn');
            const goToHeaven = document.getElementById('goToHeavenBtn');
            if (goToHell) goToHell.addEventListener('click', function() { navigateTo('hell'); });
            if (goToHeaven) goToHeaven.addEventListener('click', function() { navigateTo('heaven'); });

            const hellSingle = document.getElementById('hellSingleBtn');
            if (hellSingle) {
                hellSingle.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open("https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1", "_blank");
                    showToast('Ты выбрал ад, рикролл обеспечен', 2800);
                });
            }

            const heavenSingle = document.getElementById('heavenSingleBtn');
            if (heavenSingle) {
                heavenSingle.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open("https://www.youtube.com/watch?v=J---aiyznGQ&list=RDJ---aiyznGQ&start_radio=1", "_blank");
                    showToast('Ты выбрал рай, тебя тут ждал Мили-Котек', 2500);
                });
            }

            const backFromHell = document.getElementById('backToMainFromHell');
            const backFromHeaven = document.getElementById('backToMainFromHeaven');
            const backFromAbout = document.getElementById('backToMainFromAbout');
            const backFromAccount = document.getElementById('backToMainFromAccount');
            if (backFromHell) backFromHell.addEventListener('click', function() { navigateTo('main'); });
            if (backFromHeaven) backFromHeaven.addEventListener('click', function() { navigateTo('main'); });
            if (backFromAbout) backFromAbout.addEventListener('click', function() { navigateTo('main'); });
            if (backFromAccount) backFromAccount.addEventListener('click', function() { navigateTo('main'); });

            const showLoginBtn = document.getElementById('showLoginBtn');
            if (showLoginBtn) {
                showLoginBtn.addEventListener('click', function() { showLoginModal(); });
            }

            const showRegBtn = document.getElementById('showRegBtn');
            if (showRegBtn) {
                showRegBtn.addEventListener('click', function() { showRegistrationModal(); });
            }

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() { logoutUser(); });
            }

            const homeLink = document.getElementById('homeLink');
            if (homeLink) homeLink.addEventListener('click', function() { navigateTo('main'); });
        }

        function navigateTo(page) {
            currentPage = page;
            let htmlContent = '';
            if (page === 'main') {
                htmlContent = renderMainPage();
                document.title = 'Main Page | Главная страница';
            } else if (page === 'hell') {
                htmlContent = renderHellPage();
                document.title = 'To Hell and BACK';
            } else if (page === 'heaven') {
                htmlContent = renderHeavenPage();
                document.title = 'OverHeaven with DIO';
            } else if (page === 'about') {
                htmlContent = renderAboutPage();
                document.title = 'Создатели этого сайта';
            } else if (page === 'gallery') {
                htmlContent = renderGalleryPage();
                document.title = 'Галерея Magic Pedic';
            } else if (page === 'account') {
                htmlContent = showAccountPage();
                document.title = 'Личный кабинет | Magic Pedic';
            }
            if (appContainer) {
                appContainer.innerHTML = htmlContent;
                setTimeout(function() {
                    attachEventListeners();
                    if (page === 'gallery') renderGalleryPageContent();
                }, 50);
            }
        }

        const footerAboutBtn = document.getElementById('footerAboutBtn');
        if (footerAboutBtn) {
            footerAboutBtn.addEventListener('click', function() {
                navigateTo('about');
                showToast('Информация о создателях', 2000);
            });
        }

        const galleryLink = document.getElementById('galleryLink');
        const accountLink = document.getElementById('accountLink');
        
        if (galleryLink) {
            galleryLink.addEventListener('click', function() {
                navigateTo('gallery');
                showToast('Добро пожаловать в галерею!', 2000);
            });
        }
        
        if (accountLink) {
            accountLink.addEventListener('click', function() {
                navigateTo('account');
            });
        }

        function init() {
            currentUser = getUserData();
            updateFooterDate();
            if (!localStorage.getItem('magicPedicGallery')) saveGalleryData(GALLERY_IMAGES);
            navigateTo('main');
            startPetals();
        }

        init();
    </script>
</body>
</html>
